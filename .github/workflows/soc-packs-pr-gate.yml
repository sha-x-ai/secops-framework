name: SOC Packs — PR Gate

# ─────────────────────────────────────────────────────────────────
# Runs on every PR targeting main. All jobs must pass before merge.
#
# Job 1  · scan           — no customer data in the diff
# Job 1b · version-plan   — read version:patch/minor/major label;
#                           default patch + warning if no label;
#                           hard-block if contract file changed without major
# Job 2  · detect         — find packs with content changes; pass bump_level
# Job 3  · json-integrity — pack_catalog.json schema + xsoar_config.json validity
#                          + cross-pack dependency version check (--strict)
# Job 4  · shadow-mode    — every SOCCommandWrapper action must have shadow_mode: true
#                          in SOCFrameworkActions_V3, OR be listed with a documented
#                          reason in shadow_mode_policy.json (read-only/enrichment only).
#                          Blocks the entire downstream chain on any violation.
# Job 5  · validate       — demisto-sdk normalize + validate
# Job 6  · preflight      — xsoar_config.json format + doc URL checks
# Job 7  · prerelease     — build zip + upload as PR prerelease tag
#                          e.g. SocFrameworkProofPointTap-v1.1.1-pr647
#                          Also uploads a modified xsoar_config.json
#                          as a release asset with the prerelease zip URL.
# Job 8  · deploy-dev     — deploy to test tenant using prerelease assets
#
# After merge, soc-packs-release.yml:
#   · reads the merged PR label to determine bump level
#   · bumps pack_metadata.json (patch / minor / major)
#   · builds the immutable production zip
#   · updates pack_catalog.json only after a successful release
# ─────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Default: read-only. Jobs that create releases override to write.
permissions:
  contents: read

env:
  PACKS_DIR: Packs
  DEMISTO_SDK_VERSION: "1.38.14"
  DEMISTO_SDK_IGNORE_CONTENT_WARNING: "1"

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  # ── JOB 0: INTAKE GATE ──────────────────────────────────────────
  # Blocks the entire pipeline until a reviewer has inspected the
  # contribution on the contrib tenant (deployed by contributions-pr.yml)
  # and added the `intake:approved` label. The labeled event re-fires
  # this workflow automatically — no manual re-run required.
  #
  # Applies to ALL PRs into main, including content-less ones (workflow
  # edits, docs, tooling). Maintainers can self-add the label on their
  # own PRs when no review is needed.
  intake-gate:
    name: Intake gate — wait for reviewer approval
    runs-on: ubuntu-latest
    steps:
      - name: Verify intake:approved label is present
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'intake:approved') }}
        run: |
          echo "::error::Waiting for intake review."
          echo "A reviewer must inspect the deployed content on the contrib tenant"
          echo "and add the 'intake:approved' label before this workflow can proceed."
          echo "Push a new commit to clear the label and re-run intake."
          exit 1

  # ── JOB 1: CUSTOMER DATA SCAN ───────────────────────────────────
  scan:
    name: Scan — no customer data
    needs: [intake-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main --depth=50

      - name: Load forbidden patterns
        id: patterns
        run: |
          if [ -f Lists/customer-identifiers.json ]; then
            PATTERNS=$(python -c "
          import json, sys
          data = json.load(open('Lists/customer-identifiers.json'))
          items = data if isinstance(data, list) else data.get('identifiers', [])
          print('|'.join(str(i) for i in items if i))
          ")
            echo "patterns=$PATTERNS" >> "$GITHUB_OUTPUT"
          else
            echo "patterns=" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan diff for forbidden patterns
        run: |
          DIFF="$(git diff origin/main HEAD)"
          PATTERNS="${{ steps.patterns.outputs.patterns }}"
          if [ -z "$PATTERNS" ]; then
            echo "No customer identifiers configured — scan skipped."
            exit 0
          fi
          if echo "$DIFF" | grep -Eq "$PATTERNS"; then
            echo "::error::Customer data found in diff. Remove before merging."
            exit 1
          fi
          echo "Scan passed — no customer data found."

  # ── JOB 1b: VERSION PLAN ────────────────────────────────────────
  # Reads the PR label and determines the bump level for this merge.
  # Defaults to patch with a warning if no label is present.
  # Hard-blocks merge if a contract/schema file changed without major.
  # Runs in parallel with scan — no dependency between them.
  version-plan:
    name: Version plan — read label
    needs: [intake-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      bump_level: ${{ steps.plan.outputs.bump_level }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main --depth=50

      - name: Resolve bump level from PR labels
        id: plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - << 'PY'
          import os, subprocess, sys

          pr_number = os.environ["PR_NUMBER"]

          result = subprocess.run(
              ["gh", "pr", "view", pr_number, "--json", "labels",
               "--jq", ".labels[].name"],
              capture_output=True, text=True
          )
          labels = result.stdout.strip().splitlines()
          print(f"PR #{pr_number} labels: {labels or '(none)'}")

          if "version:major" in labels:
              level = "major"
          elif "version:minor" in labels:
              level = "minor"
          elif "version:patch" in labels:
              level = "patch"
          else:
              level = "patch"
              print("::warning::No version label on this PR — defaulting to patch. "
                    "Add version:patch, version:minor, or version:major before merge.")

          print(f"Resolved bump level: {level}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"bump_level={level}\n")
          PY

      - name: Enforce major label on contract changes
        env:
          BUMP_LEVEL: ${{ steps.plan.outputs.bump_level }}
        run: |
          python - << 'PY'
          import os, subprocess, sys
          from pathlib import Path

          base = subprocess.check_output(
              ["git", "merge-base", "HEAD", "origin/main"], text=True
          ).strip()

          # --diff-filter=ACMR excludes deletions (D) from the pack detection.
          # Removing a file from a pack is not "touching" it for version bump
          # purposes — only additions, copies, modifications, and renames count.
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", "--diff-filter=ACMR", base, "HEAD"], text=True
          ).splitlines()

          # Any change to these files implies a breaking contract —
          # consumers of the framework depend on these schemas being stable.
          CONTRACT_PATTERNS = [
              "soc_framework_lifecycle_contracts",
              "SOCFrameworkSchema",
              "SOCFrameworkExecutionSchema",
          ]

          contract_files = [
              f for f in changed
              if any(p in f for p in CONTRACT_PATTERNS)
          ]

          level = os.environ["BUMP_LEVEL"]

          if contract_files and level != "major":
              print("::error::The following contract/schema files changed in this PR:")
              for f in contract_files:
                  print(f"  {f}")
              print("This requires the 'version:major' label. "
                    "Add it to the PR and re-run checks.")
              sys.exit(1)

          if contract_files:
              print(f"Contract change detected — major bump confirmed.")
              for f in contract_files:
                  print(f"  {f}")
          else:
              print(f"No contract changes — bump level '{level}' is valid.")
          PY

      - name: Single-pack PR check (warning only)
        # Historically a hard-block: the fear was that a single version label
        # applied to a multi-pack PR was ambiguous. In practice, the post-merge
        # bump loop in soc-packs-release.yml iterates every changed pack via
        # bump_pack_version.py and applies the same level cleanly — so a
        # version:patch label on a 2-pack PR bumps both packs by patch, which
        # is the correct, unambiguous behavior.
        #
        # Multi-pack PRs are also load-bearing for the framework: contract
        # changes, normalization sweeps, and contributor intake routinely span
        # multiple vendor packs in one logical change. Forcing a split adds
        # friction without adding safety.
        #
        # We still surface the signal as a ::warning:: so contributors notice
        # when a PR has grown beyond a single pack, in case the bumps should
        # actually differ — in which case they should split. The warning is
        # informational, not blocking.
        run: |
          python - << 'PY'
          import os, subprocess
          from pathlib import Path

          base = subprocess.check_output(
              ["git", "merge-base", "HEAD", "origin/main"], text=True
          ).strip()

          changed = subprocess.check_output(
              ["git", "diff", "--name-only", "--diff-filter=ACMR", base, "HEAD"], text=True
          ).splitlines()

          packs_dir = Path(os.environ["PACKS_DIR"])
          touched_packs = set()
          for f in changed:
              p = Path(f)
              if p.parts and p.parts[0] == str(packs_dir) and len(p.parts) > 1:
                  pack = p.parts[1]
                  if (packs_dir / pack / "pack_metadata.json").exists():
                      touched_packs.add(pack)

          if len(touched_packs) > 1:
              packs_list = ", ".join(sorted(touched_packs))
              print(f"::warning::PR touches {len(touched_packs)} packs: {packs_list}")
              print("::warning::The version label will be applied to all of them.")
              print("::warning::Split the PR only if packs need different bump levels.")
          elif touched_packs:
              print(f"Single-pack PR confirmed: {next(iter(touched_packs))}")
          else:
              print("No pack content changed — repo-level change, no pack version label required.")
          PY

  # ── JOB 2: DETECT CHANGED PACKS ────────────────────────────────
  detect:
    name: Detect changed packs
    needs: [version-plan]
    runs-on: ubuntu-latest
    outputs:
      packs:       ${{ steps.changed.outputs.packs }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
      has_content: ${{ steps.changed.outputs.has_content }}
      bump_level:  ${{ needs.version-plan.outputs.bump_level }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main --depth=50

      - name: Find changed packs (content + version)
        id: changed
        run: |
          python - << 'PY'
          import json, os, subprocess
          from pathlib import Path

          packs_dir = Path(os.environ["PACKS_DIR"])

          base = subprocess.check_output(
              ["git", "merge-base", "HEAD", "origin/main"], text=True
          ).strip()

          # --diff-filter=ACMR excludes deletions — a removed file is not
          # a meaningful content change for pack detection purposes.
          changed_files = subprocess.check_output(
              ["git", "diff", "--name-only", "--diff-filter=ACMR", base, "HEAD"], text=True
          ).splitlines()

          # has_content: any file changed under Packs/<pack>/
          # has_changes: pack_metadata.json version bumped (controls production release)
          content_packs = set()
          version_packs = set()

          for f in changed_files:
              p = Path(f)
              if p.parts and p.parts[0] == str(packs_dir):
                  pack = p.parts[1] if len(p.parts) > 1 else None
                  if not pack:
                      continue
                  meta = packs_dir / pack / "pack_metadata.json"
                  if not meta.exists():
                      continue
                  content_packs.add(pack)
                  try:
                      old = subprocess.check_output(
                          ["git", "show", f"{base}:{packs_dir}/{pack}/pack_metadata.json"],
                          stderr=subprocess.DEVNULL, text=True
                      )
                      new_text = meta.read_text()
                      old_ver = json.loads(old).get("version") or json.loads(old).get("currentVersion")
                      new_ver = json.loads(new_text).get("version") or json.loads(new_text).get("currentVersion")
                      if old_ver != new_ver:
                          version_packs.add(pack)
                  except subprocess.CalledProcessError:
                      version_packs.add(pack)

          # For prerelease/deploy: use all content-changed packs
          # For validate/preflight: also use content-changed packs (run on any change)
          # has_changes (version bump) is passed through for release workflow compatibility
          all_packs = content_packs
          out = ",".join(sorted(all_packs))
          print("Content-changed packs:", out or "(none)")
          print("Version-bumped packs:", ",".join(sorted(version_packs)) or "(none)")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"packs={out}\n")
              fh.write(f"has_content={'true' if content_packs else 'false'}\n")
              fh.write(f"has_changes={'true' if version_packs else 'false'}\n")
          PY

  # ── JOB 3: JSON INTEGRITY ───────────────────────────────────────
  # Runs on every PR regardless of version bumps.
  # pack_catalog.json is a repo-level file — always checked.
  # xsoar_config.json is scoped to changed packs when available,
  # otherwise all packs are checked as a safety net.
  json-integrity:
    name: JSON integrity — catalog + xsoar_config
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Validate pack_catalog.json
        run: |
          python tools/validate_pack_catalog.py

      - name: Validate xsoar_config.json files
        env:
          CHANGED_PACKS: ${{ needs.detect.outputs.packs }}
        run: |
          if [ -n "$CHANGED_PACKS" ]; then
            python tools/validate_xsoar_configs.py --packs "$CHANGED_PACKS"
          else
            python tools/validate_xsoar_configs.py
          fi

      - name: Check cross-pack dependency versions
        # Scans ALL packs regardless of what changed. When pack A bumps its version,
        # any consuming pack whose xsoar_config.json still references the old A version
        # fails here — even if that consuming pack has no other changes in this PR.
        run: |
          python tools/check_dependency_versions.py --strict

  # ── JOB 4: SHADOW MODE GATE ─────────────────────────────────────
  # Runs on every PR touching any content.
  # Hard-blocks merge if any SOCCommandWrapper action has shadow_mode: false
  # without a documented entry in shadow_mode_policy.json.
  # Read-only/enrichment actions approved in the policy emit warnings only.
  shadow-mode:
    name: Shadow mode — UC action gate
    needs: [detect, json-integrity]
    if: needs.detect.outputs.has_content == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate shadow mode (all packs)
        run: |
          python tools/validate_shadow_mode.py --all

  # ── JOB 5: VALIDATE ─────────────────────────────────────────────
  validate:
    name: Validate — demisto-sdk
    needs: [detect, json-integrity, shadow-mode]
    if: needs.detect.outputs.has_content == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Install demisto-sdk
        run: pip install "demisto-sdk==${DEMISTO_SDK_VERSION}"

      - name: Normalize rule IDs and adopted flags
        env:
          CHANGED_PACKS: ${{ needs.detect.outputs.packs }}
        run: |
          IFS=',' read -r -a PACKS <<< "$CHANGED_PACKS"
          for PACK in "${PACKS[@]}"; do
            [ -z "$PACK" ] && continue
            echo "=== Normalizing ${PACK} ==="
            python tools/normalize_ruleid_adopted.py --fix "${PACKS_DIR}/${PACK}" || true
          done

      - name: Run demisto-sdk validate
        env:
          CHANGED_PACKS: ${{ needs.detect.outputs.packs }}
          DEMISTO_SDK_CONTENT_PATH: ${{ github.workspace }}
        run: |
          IFS=',' read -r -a PACKS <<< "$CHANGED_PACKS"
          FAILED=0
          for PACK in "${PACKS[@]}"; do
            [ -z "$PACK" ] && continue
            echo "=== Validating ${PACK} ==="
            demisto-sdk validate \
              -i "${PACKS_DIR}/${PACK}" \
              --no-docker-checks \
              --allow-skipped \
              --skip-pack-dependencies \
              --no-multiprocessing || FAILED=1
          done
          exit $FAILED

  # ── JOB 6: PREFLIGHT xsoar_config.json ──────────────────────────
  preflight:
    name: Preflight — xsoar_config.json
    needs: [detect, json-integrity, shadow-mode, validate]
    if: needs.detect.outputs.has_content == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Validate xsoar_config.json zip format + doc URLs
        env:
          CHANGED_PACKS: ${{ needs.detect.outputs.packs }}
        run: |
          python tools/preflight_xsoar_config.py --packs "$CHANGED_PACKS"

  # ── JOB 7: BUILD PRERELEASE ZIP ─────────────────────────────────
  prerelease:
    name: Build prerelease zip
    permissions:
      contents: write
    needs: [detect, preflight]
    if: needs.detect.outputs.has_content == 'true'
    runs-on: ubuntu-latest
    outputs:
      config_url: ${{ steps.upload.outputs.config_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Build zip + create prerelease + upload modified xsoar_config.json
        id: upload
        env:
          CHANGED_PACKS: ${{ needs.detect.outputs.packs }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - << 'PY'
          import json, os, subprocess, tempfile
          from pathlib import Path

          packs_dir   = Path(os.environ["PACKS_DIR"])
          changed     = [p for p in os.environ["CHANGED_PACKS"].split(",") if p]
          repo        = os.environ["REPO"]
          pr_number   = os.environ["PR_NUMBER"]
          dist        = Path("dist")
          dist.mkdir(exist_ok=True)

          def run(cmd, **kw):
              print("+", " ".join(cmd))
              subprocess.run(cmd, check=True, **kw)

          def gh(*args, check=True):
              return subprocess.run(["gh", *args], check=check, capture_output=True, text=True)

          config_url = ""

          for pack in changed:
              pack_path  = packs_dir / pack
              meta_path  = pack_path / "pack_metadata.json"
              config_path = pack_path / "xsoar_config.json"

              if not meta_path.exists():
                  print(f"{pack}: no pack_metadata.json, skipping")
                  continue

              meta    = json.loads(meta_path.read_text())
              version = meta.get("version") or meta.get("currentVersion") or ""
              if not version:
                  print(f"{pack}: no version, skipping")
                  continue

              # PR prerelease tag — ephemeral, overwritten on every push to this PR
              pr_tag   = f"{pack}-v{version}-pr{pr_number}"
              pr_asset = f"{pack}-v{version}-pr{pr_number}.zip"
              pr_zip_url = f"https://github.com/{repo}/releases/download/{pr_tag}/{pr_asset}"

              final = dist / pr_asset
              if final.exists():
                  final.unlink()

              # Plain zip of the pack directory — preserves all XSIAM content types
              # (CorrelationRules, ModelingRules, etc.) without SDK transformation.
              # xsoar_config.json is a deploy config asset, not pack content — exclude it.
              run(["zip", "-r", str(final.resolve()), pack,
                   "--exclude", f"{pack}/xsoar_config.json"],
                  cwd=str(packs_dir.resolve()))

              if not final.exists():
                  raise RuntimeError(f"{pack}: zip produced no output at {final}")

              print(f"Built: {final}")

              # Delete existing prerelease if present, then create fresh
              gh("release", "delete", pr_tag, "--yes", "--cleanup-tag", check=False)
              gh("release", "create", pr_tag, str(final),
                 "-t", f"{pack} v{version} (PR #{pr_number})",
                 "-n", f"Ephemeral prerelease for PR #{pr_number}. Will be superseded on merge.",
                 "--prerelease")

              # Build modified xsoar_config.json with prerelease zip URL
              if config_path.exists():
                  cfg = json.loads(config_path.read_text())
                  for entry in cfg.get("custom_packs", []):
                      if entry.get("id") == f"{pack}.zip":
                          entry["url"] = pr_zip_url
                          break

                  pr_config = dist / "xsoar_config.json"
                  pr_config.write_text(json.dumps(cfg, indent=2) + "\n")

                  # Upload modified xsoar_config.json as release asset
                  gh("release", "upload", pr_tag, str(pr_config), "--clobber")

                  config_url = f"https://github.com/{repo}/releases/download/{pr_tag}/xsoar_config.json"
                  print(f"Config URL: {config_url}")

          # Write output
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"config_url={config_url}\n")
          PY

  # ── JOB 8: DEPLOY TO TEST TENANT ────────────────────────────────
  deploy-dev:
    name: Deploy — dev tenant (pre-merge)
    needs: [detect, prerelease]
    if: needs.detect.outputs.has_content == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Checkout xsiam-pov-automation
        # SECURITY: pinned to specific commit SHA — never use default branch.
        # To update: gh api repos/annabarone/xsiam-pov-automation/commits/main --jq '.sha'
        # then replace the ref value below and update the comment.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: annabarone/xsiam-pov-automation
          ref: 99e515d1458bbb72690f28915c5794fd43926e0b  # main as of 2026-03-30; update via: gh api repos/annabarone/xsiam-pov-automation/commits/main --jq '.sha'
          path: xsiam-pov-automation

      - name: Install POV requirements
        working-directory: xsiam-pov-automation
        run: pip install -r requirements.txt

      - name: Deploy to test tenant
        working-directory: xsiam-pov-automation
        env:
          DEMISTO_BASE_URL:      ${{ secrets.XSIAM_API_URL }}
          DEMISTO_API_KEY:       ${{ secrets.XSIAM_API_KEY }}
          XSIAM_AUTH_ID:         ${{ secrets.XSIAM_API_ID }}
          # Use the prerelease xsoar_config.json which points at the prerelease zip
          CONTENT_REPO_RAW_LINK: ${{ needs.prerelease.outputs.config_url }}
          DEMISTO_SDK_CONTENT_PATH: ${{ github.workspace }}
        run: |
          echo "Deploying using prerelease config: $CONTENT_REPO_RAW_LINK"
          echo "yes" | python setup.py
