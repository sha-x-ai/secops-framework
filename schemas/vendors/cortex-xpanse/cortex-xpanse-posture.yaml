# ============================================================================
# Cortex Xpanse - Attack Surface Issues (Posture lifecycle routing)
# Vendor pack mapping (one file per data source)
# ============================================================================
# Source-of-truth contract for the SOC Framework's pack content generator.
# Validated against tools/generate_vendor_content.py. The generator reads
# this file and emits:
#   - CorrelationRules/<name>.yml    (one per correlation_rules entry)
#
# No modeling rule emitted: the Cortex Xpanse-XSIAM native integration
# writes attack-surface issues DIRECTLY into the unified `issues` dataset
# with XDM normalization already applied at platform ingestion.
#
# Lifecycle: Posture (NIST SP 800-40 Rev 4 phase pattern). Routes to
# soc-framework-posture's posture_misconfig category.
#
# Parallel variant exists at cortex-xpanse-cloud.yaml routing to NIST IR /
# Cloud. Choose ONE for production - cannot enable both simultaneously
# without duplicating framework alerts on the same data source.
#
# Conceptually correct: XSIAM platform stamps xdm.issue.domain = "POSTURE"
# and original_tags = "DOM:Posture,DS:PANW/ASM" on every Cortex Xpanse
# issue at ingestion. The platform itself classifies these as posture
# events. The posture lifecycle's phase pattern (Identify/Plan/Execute/
# Verify) handles configuration-class findings in their natural shape.
#
# Trade-off: no precedent in the framework. Wiz schema header explicitly
# carves out posture for SP 800-40 patch management ("do not route there").
# Whether Cortex Xpanse fits that intent is a framework-owner decision.
# ============================================================================
vendor: cortex-xpanse
product: Cortex Xpanse
data_source: issues
category: Posture
pack: soc-cortex-xpanse-posture

raw_schema:

  # ---- Top-level XDM columns of the unified `issues` dataset ----
  # Identical to cortex-xpanse-cloud.yaml schema - same data source.

  xdm.issue.id:                     {type: string,   is_array: false}
  xdm.issue.external_id:            {type: string,   is_array: false}
  xdm.issue.name:                   {type: string,   is_array: false}
  xdm.issue.description:            {type: string,   is_array: false}
  xdm.issue.severity:               {type: string,   is_array: false}
  xdm.issue.platform_severity:      {type: string,   is_array: false}
  xdm.issue.status.progress:        {type: string,   is_array: false}
  xdm.issue.domain:                 {type: string,   is_array: false}
  xdm.issue.category:               {type: string,   is_array: false}
  xdm.issue.type:                   {type: string,   is_array: false}
  xdm.issue.detection.method:       {type: string,   is_array: false}
  xdm.issue.detection.rule_id:      {type: string,   is_array: false}
  xdm.issue.observation_time:       {type: datetime, is_array: false}
  xdm.issue.last_modified:          {type: datetime, is_array: false}
  xdm.issue.asset_ids:              {type: string,   is_array: true}
  xdm.issue.normalized_fields:      {type: string,   is_array: false}
  xdm.issue.extended_fields:        {type: string,   is_array: false}
  xdm.issue.remediation:            {type: string,   is_array: false}
  xdm.issue.impact:                 {type: string,   is_array: false}
  original_tags:                    {type: string,   is_array: true}


# ----------------------------------------------------------------------------
# Modeling rule - structurally required by tools/generate_vendor_content.py
# (post-May 28 spec change made modeling_rule mandatory). Semantically a
# passthrough: the `issues` dataset is already XDM-normalized by the platform.
# Identical to the cloud variant's modeling rule - same data source.
# ----------------------------------------------------------------------------
modeling_rule:
  fromversion: "8.0.0"
  modeling_rule_id: CortexXpanse_ModelingRule
  modeling_rule_name: Cortex Xpanse Issue Modeling Rule
  directory_name: CortexXpanse_ModelingRule
  filter:
    expression: 'xdm.issue.detection.method = "XPANSE"'
  fields:
    - xdm_path: xdm.alert.original_alert_id
      issue_field: originalalertid
      sources: [xdm.issue.id]
      expression: 'xdm.issue.id'
    - xdm_path: xdm.alert.name
      issue_field: alertname
      sources: [xdm.issue.name]
      expression: 'xdm.issue.name'
    - xdm_path: xdm.alert.description
      issue_field: eventdescription
      sources: [xdm.issue.description]
      expression: 'xdm.issue.description'
    - xdm_path: xdm.alert.severity
      issue_field: severity
      sources: [xdm.issue.severity]
      expression: 'xdm.issue.severity'
    - xdm_path: xdm.alert.category
      issue_field: alertcategory
      sources: [xdm.issue.category]
      expression: 'xdm.issue.category'
    - xdm_path: xdm.observer.vendor
      issue_field: observervendor
      sources: []
      expression: '"Palo Alto Networks"'
    - xdm_path: xdm.observer.product
      issue_field: observerproduct
      sources: []
      expression: '"Cortex Xpanse"'
  contributes:
    - Alert.OriginalID
    - Alert.Name
    - Alert.Description
    - Alert.Severity
    - Alert.Category
    - Vendor
    - Product


correlation_rules:

  - subtype: passthrough
    fromversion: "8.0.0"
    global_rule_id: 'SOC Cortex Xpanse Posture Finding'
    name: 'SOC Cortex Xpanse Posture Finding'
    description: >-
      Creates an XSIAM passthrough alert for each Cortex Xpanse attack-surface
      issue, normalized to the SOC Framework Posture lifecycle contract.
      Routes via SOCProductCategoryMap_V3 to the Posture category, dispatching
      through EP_Posture -> SOC_Posture -> SOC_Misconfig_{Identify,Plan,
      Execute,Verify} phase playbooks. Pre-loads Identify-phase context
      keys (Identify.finding_acknowledged, Identify.misconfig_summary)
      consumed by the seeded SOC_Misconfig_Identify Set tasks.
    tags:
      - SOCFramework
      - Passthrough
      - Posture
      - Cortex Xpanse

    schema_constants:
      rule_id: 0
      alert_category: User Defined
      alert_domain: DOMAIN_SECURITY
      action: ALERTS
      execution_mode: REAL_TIME
      mapping_strategy: CUSTOM
      user_defined_category: posture_category
      user_defined_severity: severity
      is_enabled: true
      drilldown_query_timeframe: ALERT
      severity: User Defined

    alert_name: '$alert_name'
    alert_description: '$alert_description'

    suppression:
      enabled: true
      duration: 1 hours
      fields: [originalalertid]
      notes: |
        xdm.issue.id is unique per Cortex Xpanse issue and stable across
        re-scans until remediation.

    pre_alter: |
      | filter xdm.issue.detection.method = "XPANSE"
      | alter
          vendor_name  = "Palo Alto Networks",
          product_name = "Cortex Xpanse",
          severity     = lowercase(xdm.issue.severity),
          finding_id   = xdm.issue.id,
          finding_name = xdm.issue.name,
          finding_description = xdm.issue.description,
          issue_type     = coalesce(xdm.issue.detection.rule_id, "Unclassified"),
          issue_category = xdm.issue.category,
          issue_status   = xdm.issue.status.progress,
          remediation    = xdm.issue.remediation,
          impact         = xdm.issue.impact,
          asset_id_primary = arrayindex(xdm.issue.asset_ids, 0)
      // Bracket-quote JSONPath syntax required - the keys inside
      // xdm.issue.normalized_fields are LITERAL dotted strings
      // (e.g., "xdm.target.host.ipv4_addresses"), not nested objects.
      // Verified in tenant: '$.xdm.target.host.ipv4_addresses[0]' returns
      // null; "$['xdm.target.host.ipv4_addresses'][0]" returns the IP.
      | alter
          target_ipv4_raw = json_extract_scalar(xdm.issue.normalized_fields, "$['xdm.target.host.ipv4_addresses'][0]"),
          target_country  = json_extract_scalar(xdm.issue.normalized_fields, "$['xdm.source.location.country'][0]")
      // posture_category - every Cortex Xpanse issue maps to posture_misconfig
      // today. Configuration-class exposures (open services, weak protocols)
      // are configuration findings, not control gaps and not drift. v1.1.0
      // could split VULNERABILITY-category issues (xdm.finding.type_id =
      // 140000000) to posture_compliance if Scott ratifies that mapping.
      | alter posture_category = "posture_misconfig"
      // Identify-phase context preload. SOC_Misconfig_Identify (seeded stub)
      // uses Set tasks for these keys; preloading from pre_alter lets the
      // playbook consume context via Foundation enrichment rather than
      // re-deriving each phase invocation.
      | alter
          identify_finding_acknowledged = true,
          identify_misconfig_summary    = concat(coalesce(issue_type, "Finding"), " | ", coalesce(finding_name, "Unspecified"), " | Severity: ", coalesce(xdm.issue.severity, "Unknown"))
      | alter
          originalalertid   = finding_id,
          originalalertname = finding_name,
          alert_name = concat("[Posture] Cortex Xpanse | ", coalesce(issue_type, "Finding"), " | ", coalesce(finding_name, "Unspecified target")),
          alert_description = coalesce(finding_description, "Cortex Xpanse attack-surface posture finding")

    final_projection:
      - _time
      - vendor_name
      - product_name
      - severity
      - finding_id
      - finding_name
      - finding_description
      - issue_type
      - issue_category
      - issue_status
      - remediation
      - impact
      - target_ipv4_raw
      - target_country
      - asset_id_primary
      - posture_category
      - identify_finding_acknowledged
      - identify_misconfig_summary
      - alert_name
      - alert_description
      - originalalertid
      - originalalertname

    alert_fields:
      # canonical core
      - {issue_field: vendor,              source: vendor_name,         bucket: computed}
      - {issue_field: product,             source: product_name,        bucket: computed}
      - {issue_field: severity,            source: severity,            bucket: computed}
      - {issue_field: alert_description,   source: alert_description,   bucket: computed}
      - {issue_field: originalalertid,     source: originalalertid,     bucket: computed}
      - {issue_field: originalalertname,   source: originalalertname,   bucket: computed}
      - {issue_field: alert_name,          source: alert_name,          bucket: computed}
      # Posture-lifecycle routing field
      - {issue_field: posture_category,    source: posture_category,    bucket: computed}
      # Cortex Xpanse specific - issue type, status, recommendation, impact
      - {issue_field: alertcategory,       source: issue_type,          bucket: computed}
      - {issue_field: findingstatus,       source: issue_status,        bucket: computed}
      - {issue_field: recommendation,      source: remediation,         bucket: computed}
      - {issue_field: impact,              source: impact,              bucket: computed}
      # Identify-phase context preload - populates the Identify.* context keys
      # that SOC_Misconfig_Identify's Set tasks reference. Per soc-framework-
      # posture phase contract (SOCFrameworkPhaseContract_POSTURE):
      #   Identify.finding_acknowledged (bool)
      #   Identify.misconfig_summary (string, category-specific)
      - {issue_field: identify_finding_acknowledged,  source: identify_finding_acknowledged,  bucket: computed}
      - {issue_field: identify_misconfig_summary,     source: identify_misconfig_summary,     bucket: computed}

    mitre_defs: {}    # Cortex Xpanse does not natively map findings to MITRE.

    investigation_query_link: |-
      dataset = issues
      | filter xdm.issue.detection.method = "XPANSE"
      | filter xdm.issue.id = "$originalalertid"
      | fields _time, xdm.issue.name, xdm.issue.description, xdm.issue.severity, xdm.issue.detection.rule_id, xdm.issue.remediation, xdm.issue.normalized_fields, xdm.issue.asset_ids

    contributes:
      - Identify.finding_acknowledged
      - Identify.misconfig_summary
      - AttackSurface.Finding.ID
      - AttackSurface.Finding.Name
      - AttackSurface.Finding.IssueType
      - AttackSurface.Finding.Status
      - AttackSurface.Finding.Remediation

