# ============================================================================
# Microsoft Defender for Endpoint — Microsoft Graph Security Alerts
# Vendor pack mapping (one file per data source)
# ============================================================================
# Source-of-truth contract for the SOC Framework's pack content generator.
# The generator reads this file and emits:
#   - ModelingRules/<id>/<id>.xif + .yml + _schema.json   (from modeling_rule)
#   - CorrelationRules/<name>.yml                          (one per correlation_rules entry)
#
# Lifecycle-neutral: this file describes vendor → XDM → issue.* normalization.
# Lifecycle-specific Artifacts schemas (NIST IR / Posture / Vuln / Threat Hunt)
# consume the normalized output. One vendor mapping serves every lifecycle.
# ============================================================================
vendor: microsoft-defender
product: Microsoft Defender for Endpoint
data_source: msft_graph_security_alerts_raw
category: Endpoint

raw_schema:

  # Fields declared in shipped _schema.json
  id:              {type: string, is_array: false}
  title:           {type: string, is_array: false}
  description:     {type: string, is_array: false}
  category:        {type: string, is_array: false}
  severity:        {type: string, is_array: false}
  status:          {type: string, is_array: false}
  serviceSource:   {type: string, is_array: false}
  productName:     {type: string, is_array: false}
  providerAlertId: {type: string, is_array: false}
  alertWebUrl:     {type: string, is_array: false}
  incidentId:      {type: string, is_array: false}
  mitreTechniques: {type: json,   is_array: true}
  evidence:        {type: json,   is_array: true,
                    json_subfields: ["@odata.type", imageFile, processCommandLine, processCreationDateTime,
                                     detectionStatus, parentProcessImageFile, parentProcessId, processId,
                                     fileDetails, hostName, ntDomain, osPlatform, mdeDeviceId,
                                     lastExternalIpAddress, lastIpAddress, deviceDnsName,
                                     userAccount, ipAddress]}

  # Fields referenced in correlation rule but missing from shipped _schema.json
  detectorId: {type: string, is_array: false, status: inferred_from_correlation}

modeling_rule:
  fromversion: "6.10.0"
  modeling_rule_id: Microsoft_Graph_MDE_ModelingRule
  modeling_rule_name: Microsoft Graph Defender EP Modeling Rule
  # Folder convention is MSGraphMDE_ModelingRule (different from id).
  directory_name: MSGraphMDE_ModelingRule

  filter:
    expression: 'serviceSource = "microsoftDefenderForEndpoint"'
    notes: |
      Microsoft Graph Security ingests alerts from many products (Office 365,
      Sentinel, Cloud App Security, etc.) into one dataset. This filter scopes
      the rule to Defender for Endpoint detections only.

  fields:

    # ------ Event identity ------

    - xdm_path: xdm.event.id
      expression: id
      sources: [id]
      issue_field: eventid

    - xdm_path: xdm.event.description
      expression: 'coalesce(description, title)'
      sources: [description, title]
      issue_field: eventdescription
      notes: Falls back to title when description is empty.

    - xdm_path: xdm.event.original_event_type
      expression: category
      sources: [category]
      issue_field: original_event_type

    # ------ Alert metadata ------

    - xdm_path: xdm.alert.name
      expression: title
      sources: [title]
      issue_field: alertname

    - xdm_path: xdm.alert.category
      expression: category
      sources: [category]
      issue_field: alertcategory

    - xdm_path: xdm.alert.original_alert_id
      expression: providerAlertId
      sources: [providerAlertId]
      issue_field: originalalertid

    - xdm_path: xdm.alert.severity
      expression: severity
      sources: [severity]
      issue_field: severity
      notes: |
        Microsoft Graph severity is a string ("low"/"medium"/"high"/"informational").
        XDM severity accepts string values; no coercion needed.

    # ------ Observer (vendor/product) ------

    - xdm_path: xdm.observer.product
      expression: productName
      sources: [productName]
      issue_field: observerproduct

    - xdm_path: xdm.observer.vendor
      expression: '"Microsoft"'
      sources: []
      issue_field: observervendor
      notes: Literal — vendor is constant for this rule.

    # ------ Network / pivot link ------

    - xdm_path: xdm.network.http.url
      expression: alertWebUrl
      sources: [alertWebUrl]
      issue_field: alerturl
      notes: Direct link back to the Microsoft Defender portal for the alert.

  # Coverage commitment — Artifacts category fields this modeling rule populates.
  contributes:
    - Endpoint.AlertID
    - Endpoint.AlertName
    - Endpoint.AlertCategory
    - Endpoint.AlertSeverity
    - Endpoint.OriginalAlertID
    - Endpoint.AlertURL
    - Vendor
    - Product

  not_contributed_by_modeling_rule:
    # All endpoint/process/file/user/IP enrichment lives in the evidence[] array
    # and is extracted by the correlation rule's pre_alter, not the modeling rule.
    - Endpoint.Hostname
    - Endpoint.Domain
    - Endpoint.AgentID
    - Endpoint.OS
    - Network.LocalIP
    - Network.RemoteIP
    - User
    - User.Domain
    - User.SID
    - Process.Name
    - Process.Path
    - Process.SHA256
    - Process.PID
    - Process.CommandLine
    - Process.Parent.Name
    - Process.Parent.Path
    - Process.Parent.SHA256
    - Target.File
    - Target.SHA256
    - MITRE.Tactic
    - MITRE.TacticID
    - MITRE.Technique
    - MITRE.TechniqueID

correlation_rules:
  - subtype: passthrough
    fromversion: "8.0.0"
    global_rule_id: 'SOC Microsoft Graph Defender EndPoint'
    name: 'SOC Microsoft Graph Defender EndPoint'
    description: >-
      Creates an XSIAM alert for each Microsoft Graph Endpoint Detection Event.
    tags:
      - SOCFramework
      - Passthrough
      - Endpoint
      - MicrosoftDefenderForEndpoint

    schema_constants:
      rule_id: 0
      alert_category: User Defined
      alert_domain: DOMAIN_SECURITY
      action: ALERTS
      execution_mode: REAL_TIME
      mapping_strategy: CUSTOM
      user_defined_category: tactic
      user_defined_severity: severity
      is_enabled: true
      drilldown_query_timeframe: ALERT
      severity: User Defined

    alert_name: '$alert_name'
    alert_description: '$description'

    suppression:
      enabled: true
      duration: 1 hours
      fields: [providerAlertId]
      notes: |
        providerAlertId is Microsoft Graph's per-alert unique identifier.
        Suppressing on it scopes dedup to a single alert — different alerts
        on the same device fire independently. 1-hour window prevents
        back-to-back ingestion polls from re-creating the same alert.

    pre_alter: |
      // Vendor / product (required for SOCProductCategoryMap routing)
      | alter vendor_name = "Microsoft", product_name = productName

      // Focus on Defender endpoint / XDR alerts
      | filter productName in ("Microsoft Defender for Endpoint", "Microsoft Defender XDR")

      // Exclude resolved alerts
      | filter status != "resolved"

      // Tactic alias — drives user_defined_category
      | alter tactic = category

      // MITRE helpers
      | alter
          cat_norm  = replace(replace(replace(replace(lowercase(category), " ", ""), "-", ""), "_", ""), ".", ""),
          mitre_str = lowercase(coalesce(mitreTechniques, ""))

      // XSIAM MITRE Normalization
      | alter
          mitre_tactic       = category,
          mitre_tactic_id    = if(
              cat_norm contains "initialaccess",       "TA0001",
              cat_norm contains "execution",           "TA0002",
              cat_norm contains "persistence",         "TA0003",
              cat_norm contains "privilegeescalation", "TA0004",
              cat_norm contains "defenseevasion",      "TA0005",
              cat_norm contains "credentialaccess",    "TA0006",
              cat_norm contains "discovery",           "TA0007",
              cat_norm contains "lateralmovement",     "TA0008",
              cat_norm contains "collection",          "TA0009",
              cat_norm contains "commandandcontrol",   "TA0011",
              cat_norm contains "exfiltration",        "TA0010",
              cat_norm contains "impact",              "TA0040",
              ""),
          mitre_technique       = mitreTechniques,
          mitre_technique_id    = mitreTechniques,
          mitre_technique_first = arrayindex(mitreTechniques -> [], 0),
          mitre_technique_str   = arraystring(mitreTechniques -> [], ", ")

      // First element of each evidence type (lightweight extraction)
      | alter
          processEvidence = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "processEvidence"), 0),
          fileEvidence    = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "fileEvidence"), 0),
          deviceEvidence  = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "deviceEvidence"), 0),
          userEvidence    = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "userEvidence"), 0),
          ipEvidence      = arrayindex(arrayfilter(evidence -> [], "@element" -> ["@odata.type"] contains "ipEvidence"), 0)

      // Process evidence (initiator / target process)
      | alter
          evidence_process_name          = processEvidence -> imageFile.fileName,
          evidence_process_path          = processEvidence -> imageFile.filePath,
          evidence_process_command_line  = processEvidence -> processCommandLine,
          evidence_process_signer        = processEvidence -> imageFile.filePublisher,
          evidence_process_sha256        = processEvidence -> imageFile.sha256,
          evidence_process_pid           = processEvidence -> processId,
          evidence_process_starttime     = processEvidence -> processCreationDateTime,
          evidence_process_action        = processEvidence -> detectionStatus,
          evidence_parent_process_signer = processEvidence -> parentProcessImageFile.filePublisher,
          evidence_parent_process_name   = coalesce(processEvidence -> parentProcessImageFile.fileName, null),
          evidence_parent_process_path   = coalesce(processEvidence -> parentProcessImageFile.filePath, null),
          evidence_parent_process_sha256 = coalesce(processEvidence -> parentProcessImageFile.sha256, null),
          evidence_parent_process_pid    = processEvidence -> parentProcessId

      // File evidence (target file)
      | alter
          evidence_file_name   = fileEvidence -> fileDetails.fileName,
          evidence_file_sha256 = fileEvidence -> fileDetails.sha256

      // Device evidence
      | alter
          evidence_device_hostname   = deviceEvidence -> hostName,
          evidence_device_ntdomain   = deviceEvidence -> ntDomain,
          evidence_device_os         = deviceEvidence -> osPlatform,
          evidence_device_agentid    = deviceEvidence -> mdeDeviceId,
          evidence_device_externalip = deviceEvidence -> lastExternalIpAddress,
          evidence_local_ipv4        = deviceEvidence -> lastIpAddress,
          evidence_device_dnsdomain  = deviceEvidence -> deviceDnsName

      // User evidence
      | alter
          evidence_user_upn      = userEvidence -> userAccount.userPrincipalName,
          evidence_user_domain   = userEvidence -> userAccount.domainName,
          evidence_user_userSid  = userEvidence -> userAccount.userSid,
          evidence_loggedon_user = userEvidence -> userAccount.accountName

      // IP evidence — discriminate IPv4 vs IPv6 by regex
      | alter
          evidence_remote_ipv4 = if(ipEvidence -> ipAddress ~= "(?:\\d{1,3}\\.){3}\\d{1,3}",
                                    ipEvidence -> ipAddress, null),
          evidence_remote_ipv6 = if(ipEvidence -> ipAddress ~= "^[0-9a-f:]+$",
                                    ipEvidence -> ipAddress, null)

      // Unified source_user + SOC Framework grouping keys
      | alter
          source_user           = coalesce(evidence_loggedon_user, evidence_user_upn),
          cid                   = incidentId,
          initiator_sha256      = evidence_process_sha256,
          cgo_sha256            = evidence_parent_process_sha256,
          target_process_sha256 = evidence_process_sha256,
          file_sha256           = evidence_file_sha256,
          remote_ip             = evidence_remote_ipv4

      // Final description and alert_name
      | alter
          description = coalesce(description,
                                 concat("Microsoft Defender for Endpoint alert: ", title)),
          alert_name  = concat(
              "[Endpoint] ",
              coalesce(evidence_device_hostname, "Unknown Host"),
              " | ",
              coalesce(category, "Detection"),
              " | ",
              coalesce(arrayindex(mitreTechniques -> [], 0), arraystring(mitreTechniques -> [], ","), title)
          )

      // ============================================================
      // CANONICAL CORE NORMALIZATION
      // Produces the 29 canonical core columns every vendor pack must
      // expose. Column names match issue field names in alert_fields.
      // Foundation, Universal Command, and SOC Framework dashboards
      // all read from this normalized surface.
      //
      // Defender ships MITRE per-alert via mitreTechniques + the category
      // field. mitre_tactic_id is computed earlier from category via
      // an if-chain. mitre_technique_first is the array's first element.
      // ============================================================
      | alter
              vendor                              = vendor_name,
              product                             = product_name,
              originalalertid                     = providerAlertId,
              originalalertname                   = alert_name,
              originalalertsource                 = productName,
              externallink                        = alertWebUrl,
              alert_description                   = description,
              severity                            = severity,
              mitretacticid                       = mitre_tactic_id,
              mitretacticname                     = mitre_tactic,
              mitretechniqueid                    = mitre_technique_first,
              mitretechniquename                  = mitre_technique_str,
              agent_hostname                      = evidence_device_hostname,
              agent_id                            = evidence_device_agentid,
              agent_device_domain                 = evidence_device_ntdomain,
              actor_effective_username            = source_user,
              actor_process_image_name            = evidence_process_name,
              actor_process_image_path            = evidence_process_path,
              actor_process_image_sha256          = evidence_process_sha256,
              actor_process_command_line          = evidence_process_command_line,
              actor_process_os_pid                = evidence_process_pid,
              causality_actor_process_image_name  = evidence_parent_process_name,
              causality_actor_process_image_path  = evidence_parent_process_path,
              causality_actor_process_image_sha256 = evidence_parent_process_sha256,
              action_file_name                    = evidence_file_name,
              action_file_path                    = null,
              action_file_sha256                  = evidence_file_sha256,
              action_local_ip                     = evidence_local_ipv4,
              action_remote_ip                    = evidence_remote_ipv4

    final_projection:
      - _time
      - incidentId
      - productName
      - vendor_name
      - product_name
      - title
      - description
      - severity
      - tactic
      - alert_name
      - category
      - alertWebUrl
      - providerAlertId
      - detectorId
      - mitreTechniques
      - mitre_str
      - cat_norm
      - mitre_tactic
      - mitre_tactic_id
      - mitre_technique
      - mitre_technique_id
      - cid
      - initiator_sha256
      - cgo_sha256
      - target_process_sha256
      - file_sha256
      - remote_ip
      - source_user
      - evidence_user_upn
      - evidence_user_userSid
      - evidence_process_name
      - evidence_process_path
      - evidence_process_command_line
      - evidence_process_signer
      - evidence_process_sha256
      - evidence_process_pid
      - evidence_parent_process_name
      - evidence_parent_process_path
      - evidence_parent_process_sha256
      - evidence_parent_process_pid
      - evidence_file_name
      - evidence_file_sha256
      - evidence_device_hostname
      - evidence_device_ntdomain
      - evidence_device_os
      - evidence_device_agentid
      - evidence_local_ipv4
      - evidence_remote_ipv4
      - evidence_remote_ipv6
      - evidence_device_externalip
      - evidence_parent_process_signer
      - evidence_process_starttime
      - evidence_process_action

    alert_fields:

      # === CANONICAL CORE — identical across every vendor pack ===
      # LHS = issue field (what Foundation reads)
      # RHS = pre_alter column with the matching canonical name
      - {issue_field: vendor, source: vendor, bucket: computed}
      - {issue_field: product, source: product, bucket: computed}
      - {issue_field: originalalertid, source: originalalertid, bucket: computed}
      - {issue_field: originalalertname, source: originalalertname, bucket: computed}
      - {issue_field: originalalertsource, source: originalalertsource, bucket: computed}
      - {issue_field: externallink, source: externallink, bucket: computed}
      - {issue_field: alert_description, source: alert_description, bucket: computed}
      - {issue_field: severity, source: severity, bucket: computed}
      - {issue_field: mitretacticid, source: mitretacticid, bucket: computed}
      - {issue_field: mitretacticname, source: mitretacticname, bucket: computed}
      - {issue_field: mitretechniqueid, source: mitretechniqueid, bucket: computed}
      - {issue_field: mitretechniquename, source: mitretechniquename, bucket: computed}
      - {issue_field: agent_hostname, source: agent_hostname, bucket: computed}
      - {issue_field: agent_id, source: agent_id, bucket: computed}
      - {issue_field: agent_device_domain, source: agent_device_domain, bucket: computed}
      - {issue_field: actor_effective_username, source: actor_effective_username, bucket: computed}
      - {issue_field: actor_process_image_name, source: actor_process_image_name, bucket: computed}
      - {issue_field: actor_process_image_path, source: actor_process_image_path, bucket: computed}
      - {issue_field: actor_process_image_sha256, source: actor_process_image_sha256, bucket: computed}
      - {issue_field: actor_process_command_line, source: actor_process_command_line, bucket: computed}
      - {issue_field: actor_process_os_pid, source: actor_process_os_pid, bucket: computed}
      - {issue_field: causality_actor_process_image_name, source: causality_actor_process_image_name, bucket: computed}
      - {issue_field: causality_actor_process_image_path, source: causality_actor_process_image_path, bucket: computed}
      - {issue_field: causality_actor_process_image_sha256, source: causality_actor_process_image_sha256, bucket: computed}
      - {issue_field: action_file_name, source: action_file_name, bucket: computed}
      - {issue_field: action_file_path, source: action_file_path, bucket: computed}
      - {issue_field: action_file_sha256, source: action_file_sha256, bucket: computed}
      - {issue_field: action_local_ip, source: action_local_ip, bucket: computed}
      - {issue_field: action_remote_ip, source: action_remote_ip, bucket: computed}

      # === VENDOR-SPECIFIC TAIL — Defender fields beyond canonical ===
      # Preserved as shipped. Defender XSIAM-XDR fields and MDE-specific surfacing.

      # User
      - {issue_field: samaccountname, source: evidence_user_upn, bucket: computed}
      - {issue_field: usersid, source: evidence_user_userSid, bucket: computed}

      # Process — additional XSIAM XDR fields
      - {issue_field: actor_process_signature_vendor, source: evidence_process_signer, bucket: computed}
      - {issue_field: processid, source: evidence_process_pid, bucket: computed}
      - {issue_field: processcreationtime, source: evidence_process_starttime, bucket: computed}

      # Parent process — additional XSIAM XDR fields
      - {issue_field: causality_actor_process_signature_vendor, source: evidence_parent_process_signer, bucket: computed}
      - {issue_field: parentprocessid, source: evidence_parent_process_pid, bucket: computed}
      - {issue_field: parentprocessname, source: evidence_parent_process_name, bucket: computed}
      - {issue_field: parentprocesspath, source: evidence_parent_process_path, bucket: computed}
      - {issue_field: parentprocesssha256, source: evidence_parent_process_sha256, bucket: computed}

      # Host / device
      - {issue_field: deviceexternalips, source: evidence_device_externalip, bucket: computed}
      - {issue_field: deviceosname, source: evidence_device_os, bucket: computed}

      # Network — IPv6 not in canonical core
      - {issue_field: action_remote_ip_v6, source: evidence_remote_ipv6, bucket: computed}

      # Alert metadata
      - {issue_field: alertaction, source: evidence_process_action, bucket: computed}
      - {issue_field: detectionid, source: detectorId, bucket: raw}
      - {issue_field: alert_name, source: alert_name, bucket: computed}

    mitre_defs:
      TA0001 - Initial Access:
        - T1566 - Phishing
        - T1190 - Exploit Public-Facing Application
      TA0002 - Execution:
        - T1059 - Command and Scripting Interpreter
        - T1204 - User Execution
        - T1047 - Windows Management Instrumentation
      TA0003 - Persistence:
        - T1547 - Boot or Logon Autostart Execution
        - T1053 - Scheduled Task/Job
        - T1574 - Hijack Execution Flow
      TA0004 - Privilege Escalation:
        - T1547 - Boot or Logon Autostart Execution
        - T1134 - Access Token Manipulation
        - T1055 - Process Injection
      TA0005 - Defense Evasion:
        - T1036 - Masquerading
        - T1055 - Process Injection
        - T1562 - Impair Defenses
        - T1027 - Obfuscated Files or Information
      TA0006 - Credential Access:
        - T1003 - OS Credential Dumping
        - T1558 - Steal or Forge Kerberos Tickets
        - T1110 - Brute Force
      TA0007 - Discovery:
        - T1033 - System Owner/User Discovery
        - T1082 - System Information Discovery
      TA0008 - Lateral Movement:
        - T1021 - Remote Services
        - T1550 - Use Alternate Authentication Material
      TA0009 - Collection:
        - T1005 - Data from Local System
      TA0011 - Command and Control:
        - T1071 - Application Layer Protocol
        - T1105 - Ingress Tool Transfer
      TA0010 - Exfiltration:
        - T1041 - Exfiltration Over C2 Channel
      TA0040 - Impact:
        - T1486 - Data Encrypted for Impact
        - T1490 - Inhibit System Recovery

    investigation_query_link: |-
      // All (stitched) activity from host - assuming raw telemetry is being collected
      dataset = xdr_data
      | filter agent_hostname = $evidence_device_hostname
      | fields *

    # Coverage commitment — Endpoint artifact fields this correlation rule populates
    # that the modeling rule does not.
    contributes:
      - Endpoint.Hostname
      - Endpoint.Domain
      - Endpoint.AgentID
      - Endpoint.OS
      - Endpoint.ExternalIP
      - Network.LocalIP
      - Network.RemoteIP
      - Network.RemoteIPv6
      - User
      - User.UPN
      - User.SID
      - User.SAM
      - Process.Name
      - Process.Path
      - Process.SHA256
      - Process.PID
      - Process.CommandLine
      - Process.Signer
      - Process.StartTime
      - Process.Parent.Name
      - Process.Parent.Path
      - Process.Parent.SHA256
      - Process.Parent.PID
      - Process.Parent.Signer
      - Target.File
      - Target.SHA256
      - MITRE.Tactic
      - MITRE.TacticID
      - MITRE.Technique
      - MITRE.TechniqueID
      - Detection.ID
