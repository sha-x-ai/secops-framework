# ============================================================================
# Proofpoint TAP — Threat Detection Events (Messages Delivered + Clicks Permitted)
# Vendor pack mapping (one file per data source)
# ============================================================================
# Source-of-truth contract for the SOC Framework's pack content generator.
# The generator reads this file and emits:
#   - ModelingRules/<id>/<id>.xif + .yml + _schema.json   (from modeling_rule)
#   - CorrelationRules/<name>.yml                          (one per correlation_rules entry)
#
# Lifecycle-neutral: this file describes vendor → XDM → issue.* normalization.
# Lifecycle-specific Artifacts schemas (NIST IR / Posture / Vuln / Threat Hunt)
# consume the normalized output. One vendor mapping serves every lifecycle.
# ============================================================================
vendor: proofpoint-tap
product: TAP
data_source: proofpoint_tap_v2_generic_alert_raw
category: Email
pack: SocFrameworkProofPointTap

raw_schema:

  # Fields declared in shipped _schema.json
  ccAddresses:    {type: string,   is_array: false}
  fromAddress:    {type: string,   is_array: false}
  GUID:           {type: string,   is_array: false}
  messageID:      {type: string,   is_array: false}
  messageParts:   {type: string,   is_array: false,  json_subfields: [filename, md5, sha256]}
  messageTime:    {type: datetime, is_array: false}
  recipient:      {type: string,   is_array: false}
  sender:         {type: string,   is_array: false}
  senderIP:       {type: string,   is_array: false}
  subject:        {type: string,   is_array: false}
  threatsInfoMap: {type: string,   is_array: false,  json_subfields: [threatID, classification, threatType, threatStatus, threatUrl, threatURL, threat]}
  clickIP:        {type: string,   is_array: false}
  clickTime:      {type: datetime, is_array: false}

  # Resolved in the correlation rule's XQL pipeline (filter/coalesce stages), so
  # they MUST be declared in _schema.json — an undeclared pipeline field makes the
  # rule fail to load on a cold tenant (101704) before any vendor data has flowed.
  # These are real Proofpoint TAP SIEM fields, not guesses: `type` is the event
  # discriminator on every TAP event; `threatStatus` and `url` are standard.
  type:           {type: string,   is_array: false, status: confirmed}
  threatStatus:   {type: string,   is_array: false, status: confirmed}
  url:            {type: string,   is_array: false, status: confirmed}

  # Referenced ONLY in the correlation rule's alert_fields projection (not the XQL
  # pipeline), so they don't block load — they resolve to null until real data
  # arrives. Left inferred because their dataset reality/type is unconfirmed;
  # declaring a wrong type here could itself be rejected once live data lands.
  campaignId:     {type: string,   is_array: false, status: inferred_from_correlation}
  phishScore:     {type: int,      is_array: false, status: inferred_from_correlation}
  malwareScore:   {type: int,      is_array: false, status: inferred_from_correlation}
  spamScore:      {type: int,      is_array: false, status: inferred_from_correlation}
  impostorScore:  {type: int,      is_array: false, status: inferred_from_correlation}
  threatTime:     {type: datetime, is_array: false, status: inferred_from_correlation}
  headerFrom:     {type: string,   is_array: false, status: inferred_from_correlation}
  headerReplyTo:  {type: string,   is_array: false, status: inferred_from_correlation}
  replyToAddress: {type: string,   is_array: false, status: inferred_from_correlation}
  messageSize:    {type: int,      is_array: false, status: inferred_from_correlation}
  xmailer:        {type: string,   is_array: false, status: inferred_from_correlation}
  id:             {type: string,   is_array: false, status: inferred_from_correlation}
  _alert_data:    {type: json,     is_array: false, status: inferred_from_correlation, json_subfields: [severity, alert_category, linkedCount]}

modeling_rule:
  fromversion: "6.10.0"
  modeling_rule_id: ProofpointTAP_modeling_rule
  modeling_rule_name: ProofpointTAP Modeling Rule
  directory_name: ProofpointTAPModelingRules

  fields:

    # ------ Email context ------
    # Email values (sender, recipients, cc, subject, message-id, delivery
    # timestamp, attachment filename/md5/sha256) ride the correlation rule's
    # alert_fields, NOT XDM. The xdm.email.* targets were dropped: they are not
    # valid paths in the Data Model and fail platform install (101704) — e.g.
    # "Field xdm.email.delivery_timestamp for model xdm is invalid." Dropping
    # loses nothing operationally (the same values flow through alert_fields).
    # Revisit XDM email mapping only against the Data Model editor's validated
    # path list.

    # ------ Source ------

    - xdm_path: xdm.source.ipv4
      expression: senderIP
      sources: [senderIP]
      issue_field: emailsenderip

  # Coverage commitment — Artifacts category fields this modeling rule populates.
  # Lifecycle-neutral: every consuming lifecycle's Artifacts.Email schema
  # joins against this list to compute its coverage report.
  contributes:
    - Email.Sender
    - Email.Recipients
    - Email.CC
    - Email.Subject
    - Email.MessageID
    - Email.DeliveryTimestamp
    - Email.ReturnPath
    - Email.Attachment.Filename       # first part only
    - Email.Attachment.MD5             # first part only
    - Email.Attachment.SHA256          # first part only
    - Network.SenderIP

correlation_rules:
  - subtype: passthrough
    fromversion: "8.0.0"
    global_rule_id: 'SOC Proofpoint TAP - Threat Detected'
    name: 'SOC Proofpoint TAP - Threat Detected'
    description: >-
      Unified Proofpoint TAP alert rule covering messages delivered and clicks permitted.
      Fires on active or malicious threat status only. Suppression is per GUID to preserve
      full blast-radius visibility for lateral risk detection.
      Replaces 1.0.4 two-rule/two-instance split. Volume controlled by threat status filter.
      Supports both V3 SOC Framework playbooks (via socfw* fields) and legacy
      soc-phishing-investigation-1.0.5 playbooks and layouts (via proofpointtap* fields).
      Legacy fields marked for removal when old phishing pack is decommissioned.
      Cross-rule grouping pivots (with CrowdStrike Falcon and other endpoint sources):
      actor_effective_username (lowercase full principal -- UPN when the vendor has it),
      user_principal (raw-case UPN, parallel pivot), action_local_ip (clickIP → endpoint
      local_ip), and action_file_sha256 (attachment hash).
      Username normalization: lowercase, DOMAIN\-prefix-stripped, full principal.
      UPN when the vendor delivers one; bare SAM only when it genuinely doesn't. Lowercase
      is mandatory -- exact-equality grouping makes casing a silent pivot-killer.
    tags:
      - SOCFramework
      - Detection
      - Email
      - ProofpointTAP
      - T1566
      - T1114

    schema_constants:
      rule_id: 0
      alert_category: User Defined
      alert_domain: DOMAIN_SECURITY
      action: ALERTS
      execution_mode: REAL_TIME
      mapping_strategy: CUSTOM
      user_defined_category: alert_category
      user_defined_severity: alert_severity
      is_enabled: true
      drilldown_query_timeframe: ALERT
      severity: User Defined

    alert_name: '$alert_name'
    alert_description: '$alert_description'

    suppression:
      enabled: true
      duration: 24 hours
      fields: [GUID, type]
      notes: |
        GUID + type: a click event reuses its delivered message's GUID, so
        GUID-only suppression swallowed the click alert whenever the user
        clicked within 24h of delivery -- exactly the escalation signal an
        analyst needs. Keying on type as well lets delivered and clicked
        suppress independently; the GUID dedup itself is correct and loses
        nothing.
        GUID is assigned per individual email delivery event in Proofpoint TAP.
        A mass email to N recipients generates N distinct GUIDs. Suppressing on
        GUID scopes deduplication to a single delivery event only — zero effect
        on any other recipient's alert. 24-hour window covers the full TAP
        replay window (TAP delivers events in batches and can replay the same
        event across multiple cycles).

    pre_alter: |
      // Vendor / product (required for SOCProductCategoryMap routing)
      | alter vendor_name = "Proofpoint", product_name = "TAP"

      // Gate 1: event type
      | filter type in ("messages delivered", "clicks permitted")

      // Gate 2: actionable threats only
      | alter threatsInfoMap_str = threatsInfoMap
      | alter first_threat_status = json_extract_scalar(threatsInfoMap_str, "$[0].threatStatus")
      | filter (
          first_threat_status in ("active", "malicious")
          or threatStatus in ("active", "malicious")
      )

      // Normalize recipient (JSON-array string) to a bare UPN for cross-vendor
      // grouping. to_string() leaves the ["x@y"] brackets; arrayindex+extract
      // yields "x@y" to match CrowdStrike/XDR user_name byte-for-byte.
      | alter recipient_upn = arrayindex(json_extract_array(recipient, "$."), 0)

      // Alert identity and naming
      | alter
          alert_severity    = if(_alert_data -> severity != null and _alert_data -> severity != "",
                                 _alert_data -> severity,
                                 "SEV_030_MEDIUM"),
          alert_category    = if(_alert_data -> alert_category != null and _alert_data -> alert_category != "",
                                 _alert_data -> alert_category,
                                 "Email Security"),
          alert_name = if(
              type = "clicks permitted",
              concat("[Email] ", coalesce(recipient_upn, "Unknown"), " - Initial Access: Malicious Link Clicked"),
              concat("[Email] ", coalesce(recipient_upn, "Unknown"), " - Initial Access: Threat Email Delivered")
          ),
          alert_type = if(
              type = "clicks permitted",
              "Proofpoint TAP - Click Permitted",
              "Proofpoint TAP - Message Delivered"
          )

      // SOC Framework: delivery action and direction
      | alter delivery_action = if(
          type = "messages delivered", "delivered",
          type = "clicks permitted",   "click_permitted",
          type = "messages blocked",   "blocked",
          type = "clicks blocked",     "click_blocked",
          type
      )
      | alter direction = "inbound"

      // SOC Framework: all threats as multi-value comma-separated strings
      | alter
          threat_ids         = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatID")), ", "),
          classification_all = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.classification")), ", "),
          threat_types       = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatType")), ", "),
          threat_statuses    = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threatStatus")), ", "),
          threat_urls        = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), coalesce(json_extract_scalar("@element", "$.threatUrl"), json_extract_scalar("@element", "$.threatURL"))), ", "),
          threat_indicators  = arraystring(arraymap(json_extract_array(threatsInfoMap_str, "$."), json_extract_scalar("@element", "$.threat")), ", ")

      // Attachment fields (all parts)
      | alter
          proofpointsha256   = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.sha256")), ", "),
          proofpointmd5      = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.md5")), ", "),
          proofpointfilename = arraystring(arraymap(json_extract_array(messageParts, "$."), json_extract_scalar("@element", "$.filename")), ", ")

      // Domain extraction
      | alter
          domain   = if(threat_types ~= "url", coalesce(extract_url_registered_domain(threat_indicators), extract_url_registered_domain(sender)), ""),
          dns_name = if(threat_types ~= "url", extract_url_registered_domain(threat_indicators), "")

      | alter cleaned_url = ltrim(replex(coalesce(threat_indicators, url), "^https?://", ""), "www.")

      | alter linkedCount = to_integer(_alert_data -> linkedCount)

      // Backwards-compat alters (first-element extractions for legacy fields)
      | alter
          bc_threatid       = json_extract_scalar(threatsInfoMap_str, "$[0].threatID"),
          bc_classification = json_extract_scalar(threatsInfoMap_str, "$[0].classification"),
          bc_threaturl      = coalesce(
              json_extract_scalar(threatsInfoMap_str, "$[0].threatUrl"),
              json_extract_scalar(threatsInfoMap_str, "$[0].threatURL")
          ),
          bc_threatinfomap  = json_extract(threatsInfoMap_str, "$[0]")

      | alter description = concat("Proofpoint TAP threat detected: ", type, " | Recipient: ", coalesce(recipient_upn, "Unknown"), " -- GUID: ", GUID)

      // Cross-rule username normalization: lowercase full principal.
      // recipient is a JSON-array string ('["x@y"]'); recipient_upn (extracted
      // above) holds the bare UPN; lowercase() at the canonical alter kills the
      // casing pitfall (exact-equality grouping). user_principal keeps raw case
      // for display/parallel pivot. CrowdStrike user_name is UPN-formatted per
      // tools/correlation_rule_grouping_check.

      // ============================================================
      // CANONICAL CORE NORMALIZATION
      // Produces the 29 canonical core columns every vendor pack must
      // expose. Column names match issue field names in alert_fields.
      // Foundation, Universal Command, and SOC Framework dashboards
      // all read from this normalized surface.
      //
      // TAP is email-only — host/process/network-host fields are null.
      // agent_device_domain is null on purpose: it is the AD machine domain
      // (an EDR concept). Mapping the URL registered domain there caused a
      // semantic clash and a false-grouping path when a threat URL domain
      // equals an AD domain. The URL registered domain rides fw_url_domain.
      // MITRE is hardcoded: TAP fires on phishing detections (messages
      // delivered with active/malicious threat status, clicks permitted).
      // Both event types map to T1566 Phishing under TA0001 Initial Access.
      // ============================================================
      | alter
              vendor                              = vendor_name,
              product                             = product_name,
              originalalertid                     = GUID,
              originalalertname                   = alert_name,
              originalalertsource                 = "Proofpoint TAP",
              externallink                        = null,
              alert_description                   = description,
              severity                            = alert_severity,
              mitretacticid                       = "TA0001",
              mitretacticname                     = "Initial Access",
              mitretechniqueid                    = "T1566",
              mitretechniquename                  = "Phishing",
              agent_hostname                      = null,
              agent_id                            = null,
              agent_device_domain                 = null,
              actor_effective_username            = lowercase(recipient_upn),
              actor_process_image_name            = null,
              actor_process_image_path            = null,
              actor_process_image_sha256          = null,
              actor_process_command_line          = null,
              actor_process_os_pid                = null,
              causality_actor_process_image_name  = null,
              causality_actor_process_image_path  = null,
              causality_actor_process_image_sha256 = null,
              action_file_name                    = proofpointfilename,
              action_file_path                    = null,
              action_file_sha256                  = proofpointsha256,
              action_local_ip                     = clickIP,
              action_remote_ip                    = null

      // Vendor-specific pivots beyond canonical core.
      // user_principal carries full UPN as a parallel grouping pivot against
      // CrowdStrike's user_principal. With actor_effective_username also now
      // carrying UPN, both fields match CrowdStrike for grouping; keeping
      // user_principal explicit avoids regressions if the canonical-core
      // username field's semantics change.
      | alter
              user_principal                      = recipient_upn

    alert_fields:

      # === CANONICAL CORE — identical across every vendor pack ===
      # LHS = issue field (what Foundation reads)
      # RHS = pre_alter column with the matching canonical name
      - {issue_field: vendor, source: vendor, bucket: computed}
      - {issue_field: product, source: product, bucket: computed}
      - {issue_field: originalalertid, source: originalalertid, bucket: computed}
      - {issue_field: originalalertname, source: originalalertname, bucket: computed}
      - {issue_field: originalalertsource, source: originalalertsource, bucket: computed}
      - {issue_field: externallink, source: externallink, bucket: computed}
      - {issue_field: alert_description, source: alert_description, bucket: computed}
      - {issue_field: severity, source: severity, bucket: computed}
      - {issue_field: mitretacticid, source: mitretacticid, bucket: computed}
      - {issue_field: mitretacticname, source: mitretacticname, bucket: computed}
      - {issue_field: mitretechniqueid, source: mitretechniqueid, bucket: computed}
      - {issue_field: mitretechniquename, source: mitretechniquename, bucket: computed}
      - {issue_field: agent_hostname, source: agent_hostname, bucket: computed}
      - {issue_field: agent_id, source: agent_id, bucket: computed}
      - {issue_field: agent_device_domain, source: agent_device_domain, bucket: computed}
      - {issue_field: actor_effective_username, source: actor_effective_username, bucket: computed}
      - {issue_field: actor_process_image_name, source: actor_process_image_name, bucket: computed}
      - {issue_field: actor_process_image_path, source: actor_process_image_path, bucket: computed}
      - {issue_field: actor_process_image_sha256, source: actor_process_image_sha256, bucket: computed}
      - {issue_field: actor_process_command_line, source: actor_process_command_line, bucket: computed}
      - {issue_field: actor_process_os_pid, source: actor_process_os_pid, bucket: computed}
      - {issue_field: causality_actor_process_image_name, source: causality_actor_process_image_name, bucket: computed}
      - {issue_field: causality_actor_process_image_path, source: causality_actor_process_image_path, bucket: computed}
      - {issue_field: causality_actor_process_image_sha256, source: causality_actor_process_image_sha256, bucket: computed}
      - {issue_field: action_file_name, source: action_file_name, bucket: computed}
      - {issue_field: action_file_path, source: action_file_path, bucket: computed}
      - {issue_field: action_file_sha256, source: action_file_sha256, bucket: computed}
      - {issue_field: action_local_ip, source: action_local_ip, bucket: computed}
      - {issue_field: action_remote_ip, source: action_remote_ip, bucket: computed}

      # === VENDOR-SPECIFIC TAIL — preserved as shipped ===
      # XSIAM email-class issue fields and TAP-specific surfacing.

      # Cross-rule grouping pivot. Both actor_effective_username and
      # user_principal now carry full UPN (e.g. "Gunter@SKT.LOCAL") to
      # match CrowdStrike's user_name and user_principal exactly. Two
      # parallel pivots cover transient mismatches if either canonical
      # field semantics shift.
      - {issue_field: user_principal, source: user_principal, bucket: computed}

      # Additional file/network fields beyond canonical
      - {issue_field: action_file_md5, source: proofpointmd5, bucket: computed}
      - {issue_field: filehash, source: proofpointsha256, bucket: computed}
      - {issue_field: dns_query_name, source: dns_name, bucket: computed}
      - {issue_field: fw_url_domain, source: domain, bucket: computed}

      # XSIAM email-class issue fields
      - {issue_field: emailmessageid, source: messageID, bucket: raw}
      - {issue_field: emailsenderip, source: senderIP, bucket: raw}
      - {issue_field: emailsource, source: sender, bucket: raw}
      - {issue_field: fw_email_recipient, source: recipient, bucket: raw}
      - {issue_field: fw_email_sender, source: sender, bucket: raw}
      - {issue_field: fw_email_subject, source: subject, bucket: raw}
      - {issue_field: clickedurls, source: cleaned_url, bucket: computed, notes: 'Cleaned URL for downstream proxy/firewall correlation'}
      - {issue_field: linkedcount, source: linkedCount, bucket: computed, notes: 'Outbound-compromise scoring signal in Email_Analysis_V3'}

      # SOC Framework email fields — read by Foundation_-_Normalize_Email_V3
      - {issue_field: socfwemaildeliveryaction, source: delivery_action, bucket: computed}
      - {issue_field: socfwemaildirection, source: direction, bucket: computed}
      - {issue_field: socfwemailthreaturl, source: threat_urls, bucket: computed}
      - {issue_field: socfwemailthreattype, source: threat_types, bucket: computed}
      - {issue_field: socfwemailthreatstatus, source: threat_statuses, bucket: computed}
      - {issue_field: socfwemailthreatid, source: threat_ids, bucket: computed}
      - {issue_field: socfwemailclassification, source: classification_all, bucket: computed}
      - {issue_field: socfwemailphishscore, source: phishScore, bucket: raw}
      - {issue_field: socfwemailmalwarescore, source: malwareScore, bucket: raw}
      - {issue_field: socfwemailcampaignid, source: campaignId, bucket: raw}
      - {issue_field: socfwemailclickip, source: clickIP, bucket: raw}
      - {issue_field: socfwemailclicktime, source: clickTime, bucket: raw}

      # Legacy proofpointtap* fields — soc-phishing-investigation-1.0.5 playbooks/layouts
      # Remove when old phishing pack is decommissioned from all tenants.
      - {issue_field: proofpointtapcampaignid, source: campaignId, bucket: raw}
      - {issue_field: proofpointtapclickip, source: clickIP, bucket: raw}
      - {issue_field: proofpointtapclicktime, source: clickTime, bucket: raw}
      - {issue_field: proofpointtapguid, source: GUID, bucket: raw}
      - {issue_field: proofpointtapheadersfrom, source: headerFrom, bucket: raw}
      - {issue_field: proofpointtapheadersreplyto, source: headerReplyTo, bucket: raw}
      - {issue_field: proofpointtapid, source: id, bucket: raw}
      - {issue_field: proofpointtapimposterscore, source: impostorScore, bucket: raw}
      - {issue_field: proofpointtapmalwarescore, source: malwareScore, bucket: raw}
      - {issue_field: proofpointtapmessageid, source: messageID, bucket: raw}
      - {issue_field: proofpointtapmessageparts, source: messageParts, bucket: raw}
      - {issue_field: proofpointtapmessagesize, source: messageSize, bucket: raw}
      - {issue_field: proofpointtapphishingscore, source: phishScore, bucket: raw}
      - {issue_field: proofpointtapreplytoaddress, source: replyToAddress, bucket: raw}
      - {issue_field: proofpointtapsenderip, source: senderIP, bucket: raw}
      - {issue_field: proofpointtapsmtpsender, source: sender, bucket: raw}
      - {issue_field: proofpointtapspamscore, source: spamScore, bucket: raw}
      - {issue_field: proofpointtapsubject, source: subject, bucket: raw}
      - {issue_field: proofpointtapthreatstatus, source: threatStatus, bucket: raw}
      - {issue_field: proofpointtapthreattime, source: threatTime, bucket: raw}
      - {issue_field: proofpointtaptype, source: type, bucket: raw}
      - {issue_field: proofpointtapxmailer, source: xmailer, bucket: raw}

      # Legacy fields sourced from bc_* XQL alters (first-element extractions)
      - {issue_field: proofpointtapthreatid, source: bc_threatid, bucket: computed}
      - {issue_field: proofpointtapclassification, source: bc_classification, bucket: computed}
      - {issue_field: proofpointtapsuspiciousurl, source: bc_threaturl, bucket: computed}
      - {issue_field: proofpointtapthreaturl, source: bc_threaturl, bucket: computed}
      - {issue_field: proofpointtapthreatinfomap, source: bc_threatinfomap, bucket: computed}

      # mitre_defs populated for analyst reporting. TAP doesn't ship MITRE
      # per-alert, so per-alert routing isn't possible — coverage block is the
      # right place for the rule's intended TTP scope.

      # ============================================================
      # === cliName CONVERGENCE — additive aliases (NEW) =========
      # ============================================================
      # Each alias points to the SAME pre_alter source column as an
      # existing underscored entry above. The underscored entries stay
      # for alert.* compatibility (dashboards, alert-level XQL, layouts,
      # in-flight playbook references). The cliName aliases below
      # surface the same data at issue.* — which is what the SOC
      # Framework's Foundation_-_Normalize_*_V3 reads.
      #
      # Every alias verified against the tenant /incidentfields registry
      # — these are real registered cliNames.
      #
      # Once consumers have migrated off the underscored entries, the
      # paired underscored entries become eligible for pruning. Track
      # via schemas/canonical_issue_fields.yaml deprecated_alert_fields.

      # ---- Endpoint identity ----
      - {issue_field: agentid                         , source: agent_id                                , bucket: computed}  # ← agent_id
      - {issue_field: hostname                        , source: agent_hostname                          , bucket: computed}  # ← agent_hostname
      - {issue_field: domain                          , source: agent_device_domain                     , bucket: computed}  # ← agent_device_domain

      # ---- User ----
      - {issue_field: username                        , source: actor_effective_username                , bucket: computed}  # ← actor_effective_username

      # ---- Initiator process (action's actor) ----
      - {issue_field: initiatedby                     , source: actor_process_image_name                , bucket: computed}  # ← actor_process_image_name
      - {issue_field: initiatorpath                   , source: actor_process_image_path                , bucket: computed}  # ← actor_process_image_path
      - {issue_field: initiatorsha256                 , source: actor_process_image_sha256              , bucket: computed}  # ← actor_process_image_sha256
      - {issue_field: initiatorcmd                    , source: actor_process_command_line              , bucket: computed}  # ← actor_process_command_line
      - {issue_field: initiatorpid                    , source: actor_process_os_pid                    , bucket: computed}  # ← actor_process_os_pid

      # ---- Causality (CGO) ----
      # Note: causality_actor_causality_id is not produced by this vendor's pre_alter,
      # so xdmsourceprocesscausalityid is not aliased here. CrowdStrike's pack handles it.
      - {issue_field: cgosha256                       , source: causality_actor_process_image_sha256    , bucket: computed}  # ← causality_actor_process_image_sha256

      # ---- Action target (file) ----
      - {issue_field: filename                        , source: action_file_name                        , bucket: computed}  # ← action_file_name
      - {issue_field: filepath                        , source: action_file_path                        , bucket: computed}  # ← action_file_path
      - {issue_field: filesha256                      , source: action_file_sha256                      , bucket: computed}  # ← action_file_sha256

      # ---- Action target (network) ----
      - {issue_field: localip                         , source: action_local_ip                         , bucket: computed}  # ← action_local_ip
      - {issue_field: remoteip                        , source: action_remote_ip                        , bucket: computed}  # ← action_remote_ip

      # ---- Email canonical (TAP) ----
      - {issue_field: emailrecipient                  , source: recipient                               , bucket: raw}  # ← fw_email_recipient
      - {issue_field: emailsender                     , source: sender                                  , bucket: raw}  # ← fw_email_sender
      - {issue_field: emailsubject                    , source: subject                                 , bucket: raw}  # ← fw_email_subject

      # ---- File MD5 / DNS ----
      - {issue_field: filemd5                         , source: proofpointmd5                           , bucket: computed}  # ← action_file_md5
      - {issue_field: dnsqueryname                    , source: dns_name                                , bucket: computed}  # ← dns_query_name

    mitre_defs:
      TA0001 - Initial Access: [T1566 - Phishing]
      TA0009 - Collection:     [T1114 - Email Collection]

    investigation_query_link: ''

    # Coverage commitment — Email artifact fields this correlation rule populates
    # that the modeling rule does not.
    contributes:
      - Email.Threat.URL                    # via socfwemailthreaturl
      - Email.Threat.Type                   # via socfwemailthreattype
      - Email.Threat.Status                 # via socfwemailthreatstatus
      - Email.Threat.ID                     # via socfwemailthreatid
      - Email.Threat.Classification         # via socfwemailclassification
      - Email.Threat.PhishScore             # via socfwemailphishscore
      - Email.Threat.MalwareScore           # via socfwemailmalwarescore
      - Email.Threat.CampaignID             # via socfwemailcampaignid
      - Email.Threat.ClickIP                # via socfwemailclickip
      - Email.Threat.ClickTime              # via socfwemailclicktime
      - Email.DeliveryAction                # via socfwemaildeliveryaction
      - Email.Direction                     # via socfwemaildirection
      - Email.GUID                          # via proofpointtapguid (legacy)
      - Email.Attachment.AllFilenames       # via action_file_name (comma-joined)
