# ============================================================================
# SOC Framework Normalize Map — NIST IR lifecycle
# One normalization schema per lifecycle. This file is the NIST IR contract.
# Engine (SOCNormalizeFromList) + dispatcher live in soc-optimization-unified
# and are lifecycle-agnostic; a new lifecycle ships its own file like this one.
# Read top-down: each category lists its mappings, stamps, and mirrors.
# ============================================================================
lifecycle: nist_ir
pack: soc-framework-nist-ir
list_name: SOCFrameworkNormalizeMap_NIST_IR
description: Maps issue.<field> -> SOCFramework.<target> per product category for the
  NIST IR lifecycle. mappings (issue.* passthrough), stamps (literal initializers),
  mirrors (flat -> structured Artifacts.* tree).

roles:
  canonical:    { description: The V3 contract name we agree to read, retention: forever }
  legacy_alias: { description: Older target kept for in-flight consumers, retention: deletable }
source_origins:
  native:       { description: Registered XSIAM incident-field cliName }
  socfw_custom: { description: SOC Framework custom field prefixed socfw }
# Optional per-row dedup tags (consumed by Foundation - Dedup via the producer's
# per-(lifecycle, category) projection). Tag identity-shaped rows only.
dedup_match:
  text: { description: Free-text similarity (TF-IDF-style). Use for alert names, descriptions. }
  json: { description: Exact value match. Use for identifiers (hostnames, usernames, IPs, hashes). }

categories:
  endpoint:
    status: complete
    mappings:
      - { target: Endpoint.alert_action, issue_field: alertaction, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.containment_status, issue_field: endpointisolationstatus, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.dns_queries, issue_field: dnsqueryname, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.domain, issue_field: domain, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.endpoint_id, issue_field: agentid, shape: flat, role: canonical, source_origin: native, dedup_key: true, dedup_match: json }
      - { target: Endpoint.external_ip, issue_field: deviceexternalips, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.file_path, issue_field: 'filepath.[0]', shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.file_sha256, issue_field: 'filesha256.[0]', shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.hostname, issue_field: hostname, shape: flat, role: canonical, source_origin: native, dedup_key: true, dedup_match: json }
      - { target: Endpoint.ip_address, issue_field: localip, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.mac_address, issue_field: hostmacaddress, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.os, issue_field: ostype, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.parent_process_cmd, issue_field: parentprocesscmd, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.parent_process_name, issue_field: parentprocessname, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.parent_process_sha256, issue_field: parentprocesssha256, shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.process_cmd, issue_field: 'initiatorcmd.[0]', shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.process_name, issue_field: 'initiatedby.[0]', shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.process_path, issue_field: 'initiatorpath.[0]', shape: flat, role: canonical, source_origin: native }
      - { target: Endpoint.process_pid, issue_field: 'initiatorpid.[0]', shape: flat, role: canonical, source_origin: native }
