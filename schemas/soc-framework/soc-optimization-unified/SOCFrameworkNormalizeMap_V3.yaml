# ============================================================================
# SOC Framework Normalize Map — soc-optimization-unified
# Ground-truth contract for the per-category Foundation normalizer playbooks
# ============================================================================
# Source-of-truth for the SOC Framework content generator. The generator
# (tools/generate_soc_framework_content.py) reads this file and emits:
#   - Packs/soc-optimization-unified/Lists/SOCFrameworkNormalizeMap_V3/<name>.json
#   - Packs/soc-optimization-unified/Lists/SOCFrameworkNormalizeMap_V3/<name>_data.json
#
# This schema documents EXACTLY what the existing
# Foundation_-_Normalize_<Category>_V3 playbooks should write. Every entry
# is verifiable against the playbook YAML; drift means a playbook change
# without a schema PR (or vice versa).
#
# ----------------------------------------------------------------------------
# CHANGELOG — identity convergence (this revision)
# ----------------------------------------------------------------------------
# Identity band moved from `deferred` to `in-progress`. Flat issue_field
# values flipped per cliName classification:
#
#   Native cliNames (verified via /incidentfields dump or endpoint-band reuse):
#     - Identity.username        ← 'username.[0]'
#     - Identity.user_id         ← userid
#     - Identity.event_type      ← eventtype
#     - Identity.client_ip       ← localip          (was: sourceip)
#     - Identity.source_hostname ← hostname         (was: sourcehostname)
#     - Identity.user_agent      ← 'initiatedby.[0]' (was: useragent)
#
#   Existing socfwidentity* customs (verified present on brumxdr tenant):
#     - Identity.auth_source       ← socfwidentityauthsource
#     - Identity.country           ← socfwidentitycountry
#     - Identity.outcome           ← socfwidentityoutcome
#     - Identity.risk_level        ← socfwidentityrisklevel
#     - Identity.user_display_name ← socfwidentityuserdisplayname
#     - Identity.user_email        ← socfwidentityuseremail
#
#   socfwidentity* customs to be created (block Identity activation):
#     - Identity.logon_type      ← socfwidentitylogontype
#     - Identity.mfa_method      ← socfwidentitymfamethod
#     - Identity.session_id      ← socfwidentitysessionid
#     - Identity.target_resource ← socfwidentitytargetresource
#     - Identity.device_id       ← socfwidentitydeviceid     (verify on tenant first)
#
# Structured Artifacts.Identity.* tree added (17 mirrors), populated from the
# flat Identity.* surface — same pattern Email uses for Artifacts.Email.*.
#
# Reference: schemas/xsiam_alert_fields.yaml captures the field surface of
# the canonical "Impossible traveler - SSO" Magnifier UEBA alert this
# convergence was anchored against. For SSO alerts: hostname/hostip/agentid
# all carry the user's source IP, NOT endpoint identifiers — Identity
# normalizer must treat as auth-source signals.
#
# ----------------------------------------------------------------------------
# CHANGELOG — cliName convergence (prior revision)
# ----------------------------------------------------------------------------
# All `issue_field:` values flipped from XSIAM ALERT-field names (underscored
# canonical-core forms emitted by vendor pack alert_fields blocks, e.g.,
# `agent_id`, `agent_hostname`, `actor_process_image_name`, `action_file_*`,
# `causality_actor_causality_id`) to ISSUE-field cliNames (the registered
# incident-field names that `issue.*` actually surfaces in playbook context,
# e.g., `agentid`, `hostname`, `initiatedby`, `filename`, `filesha256`,
# `xdmsourceprocesscausalityid`).
#
# Verified against tenant /incidentfields dump (1,857 fields) — every
# cliName below is a registered incident field on brumxdr.
#
# Notable surprises beyond the obvious agent_id → agentid:
#   - `mac` is NOT a registered cliName. Use `hostmacaddress`.
#   - `endpointstatus` is NOT registered. Use `endpointisolationstatus`.
#   - `action_local_ip` is NOT registered. Use `localip`.
#   - `dns_query_name` is NOT registered. Use `dnsqueryname`.
#
# Dropped from prior revision (no registered cliName, currently unused
# downstream — re-add as `socfwendpoint*` custom fields when consumers wire up):
#   - Endpoint.user_principal (was: issue.user_principal)
#   - Endpoint.network_accesses (was: issue.network_accesses)
#
# ----------------------------------------------------------------------------
# SHAPE — flat vs structured
# ----------------------------------------------------------------------------
# Every mapping declares a shape. There are exactly two.
#
# flat
#   Path:      SOCFramework.<Category>.<leaf>
#   Depth:     Exactly two levels under the SOCFramework root.
#   Naming:    snake_case leaf.
#   Examples:  SOCFramework.Endpoint.hostname
#              SOCFramework.Email.sender
#              SOCFramework.Identity.username
#   Audience:  Per-category consumers. Convenience surface kept alive for
#              playbooks reading the per-category namespace directly.
#   Vendor:    Often shaped to one vendor's data model. Not guaranteed
#              vendor-agnostic.
#
# structured
#   Path:      SOCFramework.Artifacts.<Domain>.[<Sub>.]<Leaf>
#   Depth:     Three or more levels under the SOCFramework root.
#              Always rooted in SOCFramework.Artifacts.*.
#   Naming:    PascalCase leaves under PascalCase sub-groups.
#   Examples:  SOCFramework.Artifacts.Endpoint.AgentID
#              SOCFramework.Artifacts.Process.Causality.ID
#              SOCFramework.Artifacts.Email.From
#              SOCFramework.Artifacts.Target.SHA256
#   Audience:  NIST IR Lifecycle and Workflow playbooks. The V3 contract
#              surface. Vendor-agnostic by design.
#   Vendor:    Vendor-neutral. Same target populated identically whether
#              the alert came from native XDR Agent, CrowdStrike,
#              Defender, Trend Micro, or Proofpoint.
#
# The Artifacts.* tree is its own naming island. Everywhere else in
# SOCFramework.* uses snake_case leaves.
#
# Rule of thumb for new mappings:
#   - Consumed by Lifecycle/Workflow → structured.
#   - Per-category convenience for in-pack consumers → flat.
#   - Default for new V3 work → structured. Add a flat sibling only when
#     a specific consumer documents the need.
#
# ----------------------------------------------------------------------------
# Three kinds of writes are modeled
# ----------------------------------------------------------------------------
#   mappings:  issue.<source> → SOCFramework.<target>
#              Passthrough from incident fields. Source string is verbatim,
#              including XSOAR DT array-index syntax `.[0]` where the
#              playbook uses it.
#
#   stamps:    literal_value → SOCFramework.<target>
#              Constant-value writes. Used for normalizer self-attribution
#              ('normalization_source: endpoint') and explicit empty-init
#              ('Artifacts.Process.Verdict: empty string').
#
#   mirrors:   SOCFramework.<source> → SOCFramework.<target>
#              Internal copies after the mappings phase. The structured
#              Artifacts.Email.* tree is populated by mirroring the flat
#              Email.* writes — the data-driven script must run mappings
#              before mirrors.
#
# ----------------------------------------------------------------------------
# ROLES — every entry declares one
# ----------------------------------------------------------------------------
#   canonical
#     The V3 contract. The one name we agree to read for this concept.
#     Stable. Required. Retention: forever.
#
#   legacy_alias
#     Older target name kept alive for downstream playbooks reading the
#     old key. Must declare `superseded_by` pointing at the canonical
#     target. Retention: deletable when consumers migrate.
#     Grouped at the bottom of each category for one-shot deletion.
#
# ----------------------------------------------------------------------------
# SOURCE ORIGINS — every mapping declares one
# ----------------------------------------------------------------------------
#   native
#     XSIAM provides the field as a registered incident-field cliName.
#     Either populated natively for XDR Agent alerts, or surfaced into
#     issue.* via vendor pack alert_fields blocks whose LHS keys are
#     registered cliNames. No SOC Framework custom plumbing required.
#
#   socfw_custom
#     SOC Framework custom field, prefixed `socfw*`. Created by a
#     correlation rule's alert_fields because XSIAM has no native
#     equivalent. Vendor pack authors must emit these explicitly.
#
# ----------------------------------------------------------------------------
# SCOPE — current build
# ----------------------------------------------------------------------------
#   In scope: endpoint, email, identity
#   Future:   network, cloud, generic, workload, saas, pam, data,
#             agentic_endpoint
#
# ----------------------------------------------------------------------------
# DRIFT (asymmetric)
# ----------------------------------------------------------------------------
#   Schema category not in SOCProductCategoryMap_V3 → ERROR
#   Map category not in schema                       → INFO
#   legacy_alias entry without superseded_by         → ERROR (CI)
#   structured target not under SOCFramework.Artifacts.* → ERROR (CI)
#   flat target depth != 2 levels under SOCFramework → ERROR (CI)
#   issue_field not in canonical_issue_fields.yaml allowlist → ERROR (CI, future)
# ============================================================================

pack: soc-optimization-unified
list_name: SOCFrameworkNormalizeMap_V3
description: Maps issue.<field> -> SOCFramework.<target> per product category, plus stamps and mirrors. Two roles (canonical, legacy_alias) and two source origins (native, socfw_custom).

# ============================================================================
# Roles — machine-readable definitions for CI validators
# ============================================================================
roles:
  canonical:
    description: The V3 contract. The one name we agree to read for this concept.
    retention: forever
  legacy_alias:
    description: Older target name kept alive for in-flight playbook consumers. Delete when consumers migrate.
    retention: deletable
    requires: [superseded_by]

# ============================================================================
# Source origins — machine-readable definitions
# ============================================================================
source_origins:
  native:
    description: Registered XSIAM incident-field cliName. Populated either natively for XDR Agent alerts, or via vendor pack alert_fields blocks whose LHS keys match a registered cliName.
  socfw_custom:
    description: SOC Framework custom field, prefixed socfw*. Created via correlation rule alert_fields because XSIAM has no native cliName equivalent.
    prefix_required: socfw

# ============================================================================
# Categories — must be a SUBSET of SOCProductCategoryMap_V3 distinct values
# ============================================================================
# flat_coverage and structured_coverage replace the old per-category
# `shape:` field. Each takes one of: complete | partial | none.
# CI may use these to validate that the mappings list contains entries
# matching the declared coverage (e.g., a category claiming
# structured_coverage: complete must have at least one shape: structured
# mapping in the canonical role band).
# ============================================================================
categories:
  endpoint:
    status: complete
    flat_coverage: complete
    structured_coverage: complete
    source_playbook: Foundation_-_Normalize_Endpoint_V3
  email:
    status: partial
    flat_coverage: complete
    structured_coverage: partial
    source_playbook: Foundation_-_Normalize_Email_V3
    notes: Artifacts.Email.* tree populated via mirrors; no Process/Target/etc. structured trees yet.
  identity:
    status: in-progress
    flat_coverage: complete
    structured_coverage: complete
    source_playbook: Foundation_-_Normalize_Identity_V3
    notes: |
      Convergence pass applied. Flat band uses registered native cliNames
      where verified (username, userid, eventtype, localip, hostname,
      initiatedby) and socfwidentity* customs elsewhere. Six customs already
      exist on tenant (authsource, country, outcome, risklevel,
      userdisplayname, useremail); five need creating before workflow
      activation (logontype, mfamethod, sessionid, targetresource, deviceid).
      Structured Artifacts.Identity.* tree populated via mirrors.

# ============================================================================
# Mappings — passthrough from issue.<field>
# ============================================================================
# `issue_field` is verbatim from the playbook value expression. Where the
# playbook reads ${issue.X.[0]}, the schema records 'X.[0]' (quoted because
# brackets are YAML flow-style metacharacters). The data-driven normalizer
# parses the .[N] suffix as an XSOAR DT array index.
#
# Bands within each category, in order:
#   1. CANONICAL :: flat        — keep forever
#   2. CANONICAL :: structured  — keep forever
#   3. LEGACY ALIASES           — deletable block, grouped at category tail
# ============================================================================
mappings:

  # ==========================================================================
  # endpoint :: CANONICAL — flat per-category surface (SOCFramework.Endpoint.*)
  # --------------------------------------------------------------------------
  # Reads registered XSIAM incident-field cliNames. Every entry: role=canonical,
  # origin=native. Array-shaped cliNames use `.[0]` to extract the first value
  # (matches XDR Agent native shape; vendor packs emit single values via
  # correlation rules so `.[0]` is a no-op for those).
  # ==========================================================================
  - { category: endpoint, target: Endpoint.alert_action          , issue_field: alertaction              , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.containment_status    , issue_field: endpointisolationstatus  , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.dns_queries           , issue_field: dnsqueryname             , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.domain                , issue_field: domain                   , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.endpoint_id           , issue_field: agentid                  , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.external_ip           , issue_field: deviceexternalips        , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.file_path             , issue_field: 'filepath.[0]'           , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.file_sha256           , issue_field: 'filesha256.[0]'         , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.hostname              , issue_field: hostname                 , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.ip_address            , issue_field: localip                  , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.mac_address           , issue_field: hostmacaddress           , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.os                    , issue_field: ostype                   , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.parent_process_cmd    , issue_field: parentprocesscmd         , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.parent_process_name   , issue_field: parentprocessname        , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.parent_process_sha256 , issue_field: parentprocesssha256      , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.process_cmd           , issue_field: 'initiatorcmd.[0]'       , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.process_name          , issue_field: 'initiatedby.[0]'        , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.process_path          , issue_field: 'initiatorpath.[0]'      , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.process_pid           , issue_field: 'initiatorpid.[0]'       , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.process_sha256        , issue_field: 'initiatorsha256.[0]'    , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.tactic                , issue_field: mitretacticname          , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.tactic_id             , issue_field: mitretacticid            , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.technique             , issue_field: mitretechniquename       , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.technique_id          , issue_field: mitretechniqueid         , shape: flat, role: canonical, source_origin: native }
  - { category: endpoint, target: Endpoint.username              , issue_field: 'username.[0]'           , shape: flat, role: canonical, source_origin: native }
  # DROPPED (no registered cliName, currently unused downstream):
  #   Endpoint.user_principal     ← was: issue.user_principal
  #     Re-add as socfwendpointuserprincipal when Identity workflow consumes
  #     UPN-based account disable from endpoint context.
  #   Endpoint.network_accesses   ← was: issue.network_accesses
  #     Raw dataset field used in XQL for lateral-movement detection. No
  #     cliName equivalent. Re-add as socfwendpointnetworkaccesses if/when
  #     Containment lateral-spread detection is wired up.

  # ==========================================================================
  # endpoint :: CANONICAL — structured Artifacts tree (SOCFramework.Artifacts.*)
  # --------------------------------------------------------------------------
  # V3 vendor-agnostic contract. Read by Lifecycle and Workflow playbooks.
  # All sources are registered XSIAM incident-field cliNames verified against
  # the tenant /incidentfields dump.
  # ==========================================================================
  - { category: endpoint, target: Artifacts.Endpoint.AgentID            , issue_field: agentid                              , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Endpoint.Domain             , issue_field: domain                               , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Endpoint.FQDN               , issue_field: hostfqdn                             , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Endpoint.Hostname           , issue_field: hostname                             , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Endpoint.MACAddress         , issue_field: hostmacaddress                       , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Endpoint.OS                 , issue_field: hostos                               , shape: structured, role: canonical, source_origin: native, notes: "Display string (e.g., 'Windows 10 Pro'). Distinct from flat Endpoint.os which uses ostype family." }
  - { category: endpoint, target: Artifacts.Endpoint.OSVersion          , issue_field: agentossubtype                       , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.MITRE.Category              , issue_field: categoryname                         , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.MITRE.Tactic                , issue_field: mitretacticname                      , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.MITRE.TacticID              , issue_field: mitretacticid                        , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.MITRE.Technique             , issue_field: mitretechniquename                   , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.MITRE.TechniqueID           , issue_field: mitretechniqueid                     , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Network.IP                  , issue_field: 'hostip.[0]'                         , shape: structured, role: canonical, source_origin: native, notes: "Host primary IP. Distinct from flat Endpoint.ip_address (localip)." }
  - { category: endpoint, target: Artifacts.Process.Causality.ID        , issue_field: 'xdmsourceprocesscausalityid.[0]'    , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.Causality.InstanceID, issue_field: 'actorprocessinstanceid.[0]'         , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.CommandLine         , issue_field: 'initiatorcmd.[0]'                   , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.MD5                 , issue_field: 'initiatormd5.[0]'                   , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.Name                , issue_field: 'initiatedby.[0]'                    , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.Parent.PID          , issue_field: 'osparentid.[0]'                     , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.Parent.Signature    , issue_field: 'osparentsignature.[0]'              , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.Path                , issue_field: 'initiatorpath.[0]'                  , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.PID                 , issue_field: 'initiatorpid.[0]'                   , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.SHA256              , issue_field: 'initiatorsha256.[0]'                , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.Signature           , issue_field: 'initiatorsignature.[0]'             , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Process.Signer              , issue_field: 'initiatorsigner.[0]'                , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Source.Action               , issue_field: 'action.[0]'                         , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Source.AlertDomain          , issue_field: alert_domain                         , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Source.Module               , issue_field: 'module.[0]'                         , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Target.File                 , issue_field: 'filename.[0]'                       , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Target.Path                 , issue_field: 'filepath.[0]'                       , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Target.SHA256               , issue_field: 'filesha256.[0]'                     , shape: structured, role: canonical, source_origin: native }
  - { category: endpoint, target: Artifacts.Target.SignatureStatus      , issue_field: 'xdmtargetprocessexecutablesignaturestatus.[0]', shape: structured, role: canonical, source_origin: native }

  # ==========================================================================
  # endpoint :: LEGACY ALIASES — DELETABLE BLOCK
  # --------------------------------------------------------------------------
  # Flat-form Artifacts.* keys that predate the sub-tree pattern. Kept alive
  # for downstream playbooks still reading the old key names.
  #
  # When every consumer has migrated to the superseded_by target, delete
  # this entire block as one operation. Audit consumers via:
  #   grep -rE "Artifacts\.(EndPointID|File|FilePath|Hash|User)([^.]|$)" Packs/
  #
  # Sources updated to registered cliNames so the legacy targets are still
  # populated correctly during the transition.
  # ==========================================================================
  - { category: endpoint, target: Artifacts.EndPointID , issue_field: agentid                , shape: structured, role: legacy_alias, source_origin: native, superseded_by: Artifacts.Endpoint.AgentID }
  - { category: endpoint, target: Artifacts.File       , issue_field: 'filesha256.[0]'       , shape: structured, role: legacy_alias, source_origin: native, superseded_by: Artifacts.Target.SHA256 }
  - { category: endpoint, target: Artifacts.FilePath   , issue_field: 'filepath.[0]'         , shape: structured, role: legacy_alias, source_origin: native, superseded_by: Artifacts.Target.Path }
  - { category: endpoint, target: Artifacts.Hash       , issue_field: 'filesha256.[0]'       , shape: structured, role: legacy_alias, source_origin: native, superseded_by: Artifacts.Target.SHA256 }
  - { category: endpoint, target: Artifacts.User       , issue_field: 'username.[0]'         , shape: structured, role: legacy_alias, source_origin: native, superseded_by: "Artifacts.User.Name (TBD — User sub-tree not yet authored)" }

  # ==========================================================================
  # email :: CANONICAL — flat per-category surface (SOCFramework.Email.*)
  # --------------------------------------------------------------------------
  # Mix of native XSIAM cliNames and SOC Framework custom socfw* fields.
  # source_origin tag distinguishes them so vendor pack authors know which
  # alert_fields they must explicitly emit.
  #
  # NOTE: attachment_name and attachment_sha256 currently sourced from
  # `action_file_name` / `action_file_sha256` — these are alert-field names,
  # NOT registered cliNames. To be verified on tenant whether email vendor
  # packs route attachment data through these or whether they need their own
  # socfwemailattachment* customs. Flagged below.
  # ==========================================================================
  - { category: email, target: Email.attachment_name  , issue_field: 'filename.[0]'          , shape: flat, role: canonical, source_origin: native, notes: "Was: action_file_name (alert-field, not a cliName). Switched to filename per cliName convergence; verify email vendor packs route attachment metadata through filename cliName." }
  - { category: email, target: Email.attachment_sha256, issue_field: 'filesha256.[0]'        , shape: flat, role: canonical, source_origin: native, notes: "Was: action_file_sha256 (alert-field, not a cliName). Same caveat as attachment_name." }
  - { category: email, target: Email.campaign_id      , issue_field: socfwemailcampaignid    , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.classification   , issue_field: socfwemailclassification, shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.click_ip         , issue_field: socfwemailclickip       , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.click_time       , issue_field: socfwemailclicktime     , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.delivery_action  , issue_field: socfwemaildeliveryaction, shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.direction        , issue_field: socfwemaildirection     , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.malware_score    , issue_field: socfwemailmalwarescore  , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.message_id       , issue_field: emailmessageid          , shape: flat, role: canonical, source_origin: native }
  - { category: email, target: Email.phish_score      , issue_field: socfwemailphishscore    , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.recipient        , issue_field: emailrecipient          , shape: flat, role: canonical, source_origin: native }
  - { category: email, target: Email.reported_by      , issue_field: reporteremailaddress    , shape: flat, role: canonical, source_origin: native }
  - { category: email, target: Email.sender           , issue_field: emailsender             , shape: flat, role: canonical, source_origin: native }
  - { category: email, target: Email.sender_ip        , issue_field: emailsenderip           , shape: flat, role: canonical, source_origin: native }
  - { category: email, target: Email.subject          , issue_field: emailsubject            , shape: flat, role: canonical, source_origin: native }
  - { category: email, target: Email.threat_id        , issue_field: socfwemailthreatid      , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.threat_status    , issue_field: socfwemailthreatstatus  , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.threat_type      , issue_field: socfwemailthreattype    , shape: flat, role: canonical, source_origin: socfw_custom }
  - { category: email, target: Email.threat_url       , issue_field: socfwemailthreaturl     , shape: flat, role: canonical, source_origin: socfw_custom }

  # email has no LEGACY ALIASES band — Artifacts.Email.* tree is populated
  # via mirrors (see mirrors section), not via direct issue.* mappings.

  # ==========================================================================
  # identity :: CANONICAL — flat per-category surface (SOCFramework.Identity.*)
  # --------------------------------------------------------------------------
  # Anchored against the canonical Magnifier UEBA "Impossible traveler - SSO"
  # alert. See schemas/xsiam_alert_fields.yaml for the full alert surface.
  #
  # Native cliNames reused from the endpoint band convention (username,
  # hostname, localip, initiatedby) carry the SAME field name but represent
  # SOURCE-side auth signals on Identity alerts, not endpoint signals. The
  # Identity normalizer is responsible for that semantic split.
  #
  # `socfwidentity*` source_origin entries split into TWO sets:
  #   - exists  : already created on tenant; vendor pack alert_fields can
  #               emit immediately
  #   - pending : NEEDS CREATING before Identity workflow activates. Each
  #               flagged in `notes:` so SDK validation surfaces them.
  # ==========================================================================
  - { category: identity, target: Identity.auth_source      , issue_field: socfwidentityauthsource     , shape: flat, role: canonical, source_origin: socfw_custom, notes: "Custom exists on tenant. Was: authsource (not registered)." }
  - { category: identity, target: Identity.client_ip        , issue_field: localip                     , shape: flat, role: canonical, source_origin: native,       notes: "Flipped sourceip → localip per cliName convergence. Same cliName as Endpoint.ip_address; on Identity alerts represents the user's source IP, not an endpoint." }
  - { category: identity, target: Identity.country          , issue_field: socfwidentitycountry        , shape: flat, role: canonical, source_origin: socfw_custom, notes: "Custom exists on tenant. Was: sourcecountry (not registered). Magnifier alerts also surface a `country` field but its registered status is unverified — sticking with the verified custom." }
  - { category: identity, target: Identity.device_id        , issue_field: socfwidentitydeviceid       , shape: flat, role: canonical, source_origin: socfw_custom, notes: "PENDING — assumed not registered, verify on tenant before creating. Source device identifier for the auth event." }
  - { category: identity, target: Identity.event_type       , issue_field: eventtype                   , shape: flat, role: canonical, source_origin: native,       notes: "Native cliName. Magnifier alerts use integer codes (e.g., 102 = Impossible Traveler); xdmeventtype carries the string form (e.g., DML_CONNECTION)." }
  - { category: identity, target: Identity.logon_type       , issue_field: socfwidentitylogontype      , shape: flat, role: canonical, source_origin: socfw_custom, notes: "PENDING — needs creating. No native cliName, no existing custom." }
  - { category: identity, target: Identity.mfa_method       , issue_field: socfwidentitymfamethod      , shape: flat, role: canonical, source_origin: socfw_custom, notes: "PENDING — needs creating. Vendor pack alert_fields would emit from xdm.event.operation_sub_type after MFA factor classification." }
  - { category: identity, target: Identity.outcome          , issue_field: socfwidentityoutcome        , shape: flat, role: canonical, source_origin: socfw_custom, notes: "Custom exists on tenant. Was: eventoutcome (not registered)." }
  - { category: identity, target: Identity.risk_level       , issue_field: socfwidentityrisklevel      , shape: flat, role: canonical, source_origin: socfw_custom, notes: "Custom exists on tenant. Was: userrisk (not registered)." }
  - { category: identity, target: Identity.session_id       , issue_field: socfwidentitysessionid      , shape: flat, role: canonical, source_origin: socfw_custom, notes: "PENDING — needs creating. Required for forced-session-revocation Containment action (soc-clear-sessions)." }
  - { category: identity, target: Identity.source_hostname  , issue_field: hostname                    , shape: flat, role: canonical, source_origin: native,       notes: "Flipped sourcehostname → hostname per cliName convergence. WARNING: For SSO alerts, hostname carries the user's source IP, NOT a hostname. Identity normalizer treats as auth-source signal." }
  - { category: identity, target: Identity.target_resource  , issue_field: socfwidentitytargetresource , shape: flat, role: canonical, source_origin: socfw_custom, notes: "PENDING — needs creating. Target SSO app / resource the auth event hit (Salesforce, GSuite, etc.)." }
  - { category: identity, target: Identity.user_agent       , issue_field: 'initiatedby.[0]'           , shape: flat, role: canonical, source_origin: native,       notes: "Flipped useragent → initiatedby per cliName convergence. Reuses the endpoint-band cliName; on Identity alerts carries browser/UA strings (e.g., 'Edge 18.26200', 'Chrome 146.0.0')." }
  - { category: identity, target: Identity.user_display_name, issue_field: socfwidentityuserdisplayname, shape: flat, role: canonical, source_origin: socfw_custom, notes: "Custom exists on tenant. Was: userdisplayname (not registered)." }
  - { category: identity, target: Identity.user_email       , issue_field: socfwidentityuseremail      , shape: flat, role: canonical, source_origin: socfw_custom, notes: "Custom exists on tenant. Was: useremail (not registered)." }
  - { category: identity, target: Identity.user_id          , issue_field: userid                      , shape: flat, role: canonical, source_origin: native }
  - { category: identity, target: Identity.username         , issue_field: 'username.[0]'              , shape: flat, role: canonical, source_origin: native,       notes: "Array on Magnifier alerts (e.g., ['corp\\\\5827014']); .[0] extraction matches endpoint-band convention." }

  # identity has no LEGACY ALIASES band — Artifacts.Identity.* tree is
  # populated via mirrors (see mirrors section), not via direct issue.* mappings.

# ============================================================================
# Stamps — literal-value writes
# ============================================================================
# Constant values the normalizer writes for self-attribution or explicit
# empty-init. Where a single SOCFramework target receives different stamps
# in different branches (e.g. email's normalization_source = 'email' vs
# 'mail_listener'), all variants are listed and the consuming script must
# choose based on routing context (out of scope for this static contract).
# ============================================================================
stamps:

  # ------ endpoint ------
  - { category: endpoint, target: Endpoint.normalization_source, value: endpoint, role: canonical }
  - { category: endpoint, target: Artifacts.Process.Verdict    , value: ''      , role: canonical, notes: "Empty-init for downstream Analysis verdict assignment." }
  - { category: endpoint, target: Artifacts.Target.Verdict     , value: ''      , role: canonical, notes: "Empty-init for downstream Analysis verdict assignment." }

  # ------ email ------
  - { category: email, target: Email.normalization_source, value: email        , role: canonical }
  - { category: email, target: Email.normalization_source, value: mail_listener, role: canonical, notes: "Alternate stamp set when alert routes via mail_listener integration." }

  # ------ identity ------
  - { category: identity, target: Identity.normalization_source, value: identity, role: canonical }

# ============================================================================
# Mirrors — internal SOCFramework.X → SOCFramework.Y copies
# ============================================================================
# Run AFTER mappings. The structured Artifacts.Email.* tree is populated
# entirely by mirroring the flat Email.* writes — keeping the schema honest
# requires capturing this dependency rather than pretending Artifacts.Email.*
# fields are direct issue.* reads.
#
# Every mirror is role: canonical structured. Mirrors do not have a
# source_origin (they read from another SOCFramework.* target, not from
# issue.*).
# ============================================================================
mirrors:

  # ------ email ------
  - { category: email, target: Artifacts.Email.From      , source: Email.sender     , role: canonical, shape: structured }
  - { category: email, target: Artifacts.Email.To        , source: Email.recipient  , role: canonical, shape: structured }
  - { category: email, target: Artifacts.Email.Subject   , source: Email.subject    , role: canonical, shape: structured }
  - { category: email, target: Artifacts.Email.MessageID , source: Email.message_id , role: canonical, shape: structured }
  - { category: email, target: Artifacts.Email.ThreatType, source: Email.threat_type, role: canonical, shape: structured }
  - { category: email, target: Artifacts.Email.ThreatURL , source: Email.threat_url , role: canonical, shape: structured }

  # ------ identity ------
  # Mirrors the flat Identity.* surface into the vendor-agnostic structured
  # tree consumed by Lifecycle and Workflow playbooks. Same pattern as Email.
  - { category: identity, target: Artifacts.Identity.User.Name        , source: Identity.username          , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.User.ID          , source: Identity.user_id           , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.User.DisplayName , source: Identity.user_display_name , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.User.Email       , source: Identity.user_email        , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Source.IP        , source: Identity.client_ip         , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Source.Hostname  , source: Identity.source_hostname   , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Source.Country   , source: Identity.country           , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Source.UserAgent , source: Identity.user_agent        , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Source.DeviceID  , source: Identity.device_id         , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Auth.Source      , source: Identity.auth_source       , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Auth.Outcome     , source: Identity.outcome           , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Auth.SessionID   , source: Identity.session_id        , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Auth.MFAMethod   , source: Identity.mfa_method        , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Auth.LogonType   , source: Identity.logon_type        , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Provider.EventType, source: Identity.event_type       , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Risk.Level       , source: Identity.risk_level        , role: canonical, shape: structured }
  - { category: identity, target: Artifacts.Identity.Target.Resource  , source: Identity.target_resource   , role: canonical, shape: structured }
