# Posture phase contract — reshaped to the SOCFrameworkPhaseContract_V3 pattern.
# Names carry NO _V3. Structure mirrors NIST IR until the workflow leaves.
# Leaf generation rule: inputs = reads_from_framework(phase) + reads_from_phases(phase);
#                       outputs = writes(phase) + writes_by_category(phase,category).
lifecycle: posture
pack: soc-framework-posture
list_name: SOCFrameworkPhaseContract_POSTURE
description: "Posture phase contract \u2014 what each phase reads (framework artifacts + prior phases),\
  \ writes, and routes to. Mirrors SOCFrameworkPhaseContract_V3 shape; names carry no _V3."
roles:
  canonical:
    description: The contract name we agree to read/write
    retention: forever
  legacy_alias:
    description: Older target kept for in-flight consumers
    retention: deletable
phases:
  identify:
    purpose: Detect/acknowledge the misconfig, drift, or compliance violation; classify.
  plan:
    purpose: Prioritize, score risk, choose remediation, obtain approvals.
  execute:
    purpose: Apply the remediation (config change, IaC PR, ticket) via Universal Command.
  verify:
    purpose: Confirm the fix landed and no regression.
categories:
- posture_misconfig
- posture_compliance
- posture_drift
routing:
