# SOC Framework Enrichment Map — Posture (Cloud Posture Management)
# Per-lifecycle Upon Trigger enrichment lanes. Convention: lane key is both
# the |||<key> built-in reputation command and its argument name (|||ip ip=...,
# |||domain domain=..., etc.). Lane fires when at least one source path is
# non-empty; values are comma-joined and the command tokenises and dedupes.
#
# CPM findings are configurations, not threats. Most lanes are sparse —
# enrichment only applies where the misconfig exposes a public-facing artifact.

lifecycle: posture
pack: soc-framework-posture
list_name: SOCFrameworkEnrichmentMap_POSTURE
description: |
  Per-lifecycle enrichment lanes for Cloud Posture Management. Sparse by
  design — CPM findings rarely have reputation-relevant artifacts.

lanes:
  ip:
    - Artifacts.CloudPosture.ExposedIP
  domain:
    - Artifacts.CloudPosture.ExposedHostname
  file: []
  url: []
