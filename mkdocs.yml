site_name: SOC Framework
site_description: Opinionated, modular SOC content for Cortex XSIAM. Auditable end-to-end. Safe by default via Shadow Mode.
site_url: https://palo-cortex.github.io/secops-framework/
repo_url: https://github.com/Palo-Cortex/secops-framework
repo_name: Palo-Cortex/secops-framework
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    # Top-bar tabs for the main sections
    - navigation.tabs
    - navigation.tabs.sticky
    # Section-style left rail; collapses by default — readers expand only
    # what they care about. ``navigation.indexes`` lets a section have its
    # own landing page by dropping ``index.md`` into the section folder.
    - navigation.sections
    - navigation.indexes
    - navigation.top
    # Fold the right TOC into the left rail; one navigation surface, less
    # visual noise, especially on short overview pages.
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/cortex.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Keep decommed prose on disk (preserved for later salvage) but out of the
  # built site. Update ``glob`` to drop additional folders as they're retired.
  - exclude:
      glob:
        - soc-optimization/*

nav:
  - Home: index.md

  - Architecture:
      - architecture/index.md
      - Alert Flow:                       architecture/alert-flow.md
      - Upon Trigger:                     architecture/upon-trigger.md
      - Entry Points:                     architecture/entry-points.md
      - Auto Triage:                      architecture/auto-triage.md
      - NIST IR Lifecycle:                architecture/nist-ir-lifecycle.md
      - Universal Command & Shadow Mode:  architecture/universal-command-shadow-mode.md
      - Value Metrics:                    architecture/value-metrics.md

  - Foundation:
      - foundation/index.md
      - "soc-framework-nist-ir":
          - Overview: soc-framework-nist-ir/overview.md
          - SOCFrameworkEnrichmentMap_NIST_IR: soc-framework-nist-ir/SOCFrameworkEnrichmentMap_NIST_IR.md
          - SOCFrameworkNormalizeMap_NIST_IR: soc-framework-nist-ir/SOCFrameworkNormalizeMap_NIST_IR.md
          - SOCFrameworkPhaseContract_V3: soc-framework-nist-ir/SOCFrameworkPhaseContract_V3.md
      - "soc-optimization-unified":
          - Overview: soc-optimization-unified/overview.md
  - Packs:
      - packs/index.md
      - "soc-checkpoint-ndr":
          - Overview: soc-checkpoint-ndr/overview.md
          - NDR (check-point-ndr): soc-checkpoint-ndr/ndr-generic-alerts.md
      - "soc-crowdstrike-falcon":
          - Overview: soc-crowdstrike-falcon/overview.md
          - Falcon (crowdstrike-falcon): soc-crowdstrike-falcon/falcon-detections.md
      - "soc-sentinel-one":
          - Overview: soc-sentinel-one/overview.md
          - SentinelOne Singularity (sentinelone): soc-sentinel-one/sentinelone-threat.md
          - SentinelOne Singularity (sentinelone): soc-sentinel-one/soc-sentinelone-threat.md
      - "soc-wiz-cloud":
          - Overview: soc-wiz-cloud/overview.md
          - Wiz Cloud (wiz): soc-wiz-cloud/wiz-finding.md
      - "SocFrameworkMicrosoftDefender":
          - Overview: SocFrameworkMicrosoftDefender/overview.md
          - Microsoft Defender for Endpoint (microsoft-defender): SocFrameworkMicrosoftDefender/microsoft-defender-alerts.md
      - "SocFrameworkProofPointTap":
          - Overview: SocFrameworkProofPointTap/overview.md
          - TAP (proofpoint-tap): SocFrameworkProofPointTap/proofpoint-tap-threats.md
      - "SocFrameworkTrendMicroVisionOne":
          - Overview: SocFrameworkTrendMicroVisionOne/overview.md
          - Vision One (trend-vision-one): SocFrameworkTrendMicroVisionOne/trend-micro-vision-one-v3.md
      - "SocFrameworkZscalerZPA":
          - Overview: SocFrameworkZscalerZPA/overview.md
  - Contributing:
      - contributing/index.md
