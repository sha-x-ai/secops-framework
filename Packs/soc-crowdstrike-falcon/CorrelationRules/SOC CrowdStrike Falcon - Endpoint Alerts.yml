# ============================================================
# SOC CrowdStrike Falcon - Endpoint Alerts
# Version: 2.0.1  (SOC Framework)
#
#
# CHANGELOG vs 2.0.0:
#   ADDED:    sourceInstance field — multi-instance attribution parity
#             with prod 1.0.14 per-tactic rules
#
# CHANGELOG vs 1.0.14:
#   BREAKING: Consolidated 15 per-tactic rules -> single rule
#             (XSIAM GUI multi-tactic filter now supported)
#   FIXED:    Schema -- id/ruleid fields required by SDK + platform
#   FIXED:    fromversion 6.10.0 -> 8.0.0 (correlation rule minimum)
#   FIXED:    Removed rule_id: 0 (caused SDK to resolve id as null)
#   FIXED:    userid: user_name -> user_principal (restored 1.0.14 BC)
#   ADDED:    alert_category: User Defined + user_defined_category: tactic
#             (replaces 15 hardcoded categories -- dynamically maps tactic)
#   ADDED:    Suppression on composite_id / 1hr (prevents duplicate ingestion)
#   ADDED:    Rich alert_name and alert_description (computed in XQL)
#   ADDED:    MITRE defs covering all 12 tactics (was one per rule)
#   ADDED:    network_accesses, dns_requests, files_written, pattern_disposition_details
#   ADDED:    Grandparent process fields (explicit mapping)
#   RESTORED (from 1.0.14):
#     - causality_actor_process_command_line: cgo_cmd
#     - causality_actor_process_image_name:  cgo_name
#     - causality_actor_process_image_path:  cgo_path
#     - deviceou: device_ou_arr  (+ XQL alter restored)
#     - filehash: sha256
# ============================================================

