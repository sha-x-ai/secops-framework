alert_type: null
crontab: null
dataset: alerts
name: SOC CrowdStrike Falcon - Endpoint Alerts
description: >-
  Creates a single XSIAM alert for each CrowdStrike Falcon Endpoint Detection event.
  Consolidates 15 per-tactic rules from v1.0.14 into one rule using MITRE tactic
  as the User Defined alert category. Backwards compatible with alert field mappings
  from all 1.0.14 per-tactic rules.
drilldown_query_timeframe: ALERT
execution_mode: REAL_TIME
global_rule_id: SOC CrowdStrike Falcon - Endpoint Alerts
investigation_query_link: |-
  // All (stitched) activity from host - assuming raw telemetry is being collected
  dataset = xdr_data
  | filter agent_hostname = $hostname
  | fields *
is_enabled: true
lookup_mapping: []
mapping_strategy: CUSTOM
mitre_defs:
  TA0001 - Initial Access:
  - T1566 - Phishing
  - T1204 - User Execution
  TA0002 - Execution:
  - T1059 - Command and Scripting Interpreter
  - T1129 - Shared Modules
  - T1204 - User Execution
  TA0003 - Persistence:
  - T1547 - Boot or Logon Autostart Execution
  - T1574 - Hijack Execution Flow
  TA0004 - Privilege Escalation:
  - T1547 - Boot or Logon Autostart Execution
  - T1574 - Hijack Execution Flow
  TA0005 - Defense Evasion:
  - T1036 - Masquerading
  - T1055 - Process Injection
  - T1574 - Hijack Execution Flow
  TA0006 - Credential Access:
  - T1003 - OS Credential Dumping
  - T1558 - Steal or Forge Kerberos Tickets
  TA0007 - Discovery:
  - T1033 - System Owner/User Discovery
  TA0008 - Lateral Movement:
  - T1021 - Remote Services
  - T1550 - Use Alternate Authentication Material
  TA0009 - Collection:
  - T1005 - Data from Local System
  - T1056 - Input Capture
  TA0010 - Exfiltration:
  - T1041 - Exfiltration Over C2 Channel
  - T1048 - Exfiltration Over Alternative Protocol
  TA0011 - Command and Control:
  - T1071 - Application Layer Protocol
  - T1105 - Ingress Tool Transfer
  TA0040 - Impact:
  - T1486 - Data Encrypted for Impact
  - T1490 - Inhibit System Recovery
search_window: null
severity: User Defined
simple_schedule: null
# -- Suppression: composite_id / 1 hour -------------------------------------
# composite_id is CrowdStrike Falcon's unique identifier per detection event.
# Suppressing on composite_id scopes deduplication to a single detection only.
# Two different detections on the same host have different composite_id values
# and each fire an alert independently -- there is no blast-radius risk.
# 1-hour window: the CrowdStrike integration polls for detections on a cycle.
# The same detection can be returned across consecutive polling windows before
# it is acknowledged. 1 hour prevents duplicate alerts from back-to-back polls
# returning the same composite_id without suppressing any distinct detection.
# Note: all 15 old 1.0.14 rules had suppression_enabled: false -- no
# deduplication at all. This is a net improvement introduced in v2.0.0.
suppression_duration: 1 hours
suppression_enabled: true
suppression_fields:
- composite_id
timezone: null
user_defined_category: tactic
user_defined_severity: severity_name
xql_query: |
  /*
  Title:       SOC CrowdStrike Falcon - Endpoint Alerts
  Description: Single consolidated rule for all CrowdStrike Falcon Endpoint Detection
               events. Replaces 15 per-tactic rules from v1.0.14.
               alert_category is dynamically set from the MITRE tactic field via
               user_defined_category: tactic.
  Dataset:     crowdstrike_falcon_event_raw
               (may differ depending on integration config -- CrowdStrike Falcon vs
                CrowdStrike Platform/Event Stream API)
  Dependencies: CrowdStrike Falcon automation integration
  Note:         Will NOT fire for alerts ingested via the "CrowdStrike Platform"
                (Event Stream API) integration.
  Version:     2.0.0 (SOC Framework)
  Changes v2.0.0:
    - Consolidated 15 per-tactic rules into one
    - Restored device_ou_arr alter (required for deviceou field mapping)
    - MITRE field aliasing: tactic->mitre_tactic, tactic_id->mitre_tactic_id, etc.
    - Un-nulled network_accesses, dns_requests (available in most deployments)
    - Rich alert_name and alert_description computed inline
    - Added files_written, pattern_disposition_details, user_principal fields
  Changes v1.1.0:
    - Un-nulled network_accesses and dns_requests
    - Added user_principal, pattern_disposition_details, files_written
  */
  dataset = crowdstrike_falcon_event_raw

  // Vendor / product (required for SOCProductCategoryMap routing)
  | alter vendor_name = "CrowdStrike", product_name = "Falcon"

  // Filter to EPP detection events only
  | filter product = "epp"

  // XSIAM MITRE Normalization
  // Map "Malware" (CrowdStrike internal) -> "Execution" for MITRE alignment
  | alter
          tactic                 = if(tactic = "Malware", "Execution", tactic),
          mitre_tactic           = if(tactic = "Malware", "Execution", tactic),
          mitre_tactic_id        = tactic_id,
          mitre_technique        = technique,
          mitre_technique_id     = technique_id

  // Combined technique string for mitretechniqueid/mitretechniquename alert_fields
  | alter mitre_ids_str = if(
      technique_id != null and technique != null,
      concat(technique_id, " - ", technique),
      coalesce(technique_id, technique)
    )

  // Extract fields from nested objects
  | alter
          hostname                    = device->hostname,
          domain                      = device->machine_domain,
          local_ip                    = device->local_ip,
          external_ip                 = device->external_ip,
          mac_address                 = device->mac_address,
          device_id                   = device->device_id,
          device_ou                   = device->ou[],
          parent_process_name         = parent_details->filename,
          parent_process_cmd          = parent_details->cmdline,
          parent_process_path         = parent_details->filepath,
          parent_process_sha256       = parent_details->sha256,
          parent_local_process_id     = parent_details->local_process_id,
          grandparent_process_name    = grandparent_details->filename,
          grandparent_process_cmd     = grandparent_details->cmdline,
          grandparent_process_path    = grandparent_details->filepath,
          grandparent_process_sha256  = grandparent_details->sha256,
          grandparent_local_process_id = grandparent_details->local_process_id

  // Clean OU array formatting (strip embedded quotes) -- required for deviceou mapping
  | alter device_ou_arr = arraymap(device_ou, replace("@element", "\"", ""))

  // CGO Normalization
  // Skips common root system processes to avoid over-grouping on wininit/userinit
  | alter cgo_name = if(lowercase(grandparent_process_name) not in ("wininit.exe", "userinit.exe"),
                        grandparent_process_name,
                        coalesce(parent_process_name, filename)),
          cgo_path = if(lowercase(grandparent_process_name) not in ("wininit.exe", "userinit.exe"),
                        grandparent_process_path,
                        coalesce(parent_process_path, filepath)),
          cgo_cmd  = if(lowercase(grandparent_process_name) not in ("wininit.exe", "userinit.exe"),
                        grandparent_process_cmd,
                        coalesce(parent_process_cmd, cmdline))

  // Network enrichment fields
  // Comment out if not present in your CrowdStrike deployment
  | alter dns_queries   = dns_requests
  | alter remote_ips    = network_accesses

  // Compute rich alert name: [Endpoint] <user or host> - <tactic>: <technique or name>
  | alter alert_name = concat(
      "[Endpoint] ",
      coalesce(user_name, hostname, "Unknown"),
      " - ",
      coalesce(tactic, "Detection"),
      ": ",
      coalesce(technique, name)
    )

  // Compute rich alert description for layout display and originaldescription mapping
  | alter alert_description = concat(
      coalesce(description, name),
      " | Host: ",  coalesce(hostname, "Unknown"),
      " | User: ",  coalesce(user_name, "Unknown"),
      " | Severity: ", coalesce(severity_name, "Unknown")
    )

  // Final field ordering -- leading fields drive alert table and grouping
  | fields
      device_id, local_ip, user_name, user_principal, cmdline,
      sha256, domain, hostname, agent_id,
      pattern_disposition_description, pattern_disposition_details,
      cgo_cmd, cgo_name, cgo_path,
      template_instance_id, external_ip, falcon_host_link, mac_address,
      mitre_tactic_id, mitre_tactic, mitre_technique_id, mitre_technique,
      mitre_ids_str,
      tactic_id, tactic, technique_id, technique,
      objective, composite_id,
      parent_process_cmd, parent_process_name, parent_local_process_id,
      parent_process_path, parent_process_sha256,
      grandparent_process_name, grandparent_process_cmd,
      grandparent_process_path, grandparent_process_sha256,
      grandparent_local_process_id,
      device_ou_arr,
      process_start_time, local_process_id, md5, scenario,
      severity_name, aggregate_id, indicator_id,
      alert_name, alert_description,
      network_accesses, dns_requests, files_written,
      *
