commonfields:
  id: SOCNormalizeFromList
  version: -1
name: SOCNormalizeFromList
script: ''
type: python
subtype: python3
fromversion: 6.10.0
dockerimage: demisto/python3:3.12.12.5490952
runas: DBotWeakRole
runonce: false
enabled: true
engineinfo: {}
mainengineinfo: {}
restrictioncenter: {}
sourcescripid: SOCNormalizeFromList
pswd: ''
signature: ''
scripttarget: 0
comment: |
  Data-driven SOC Framework normalizer. Resolves the lifecycle's contract
  list (SOCFrameworkNormalizeMap_<LIFECYCLE>) and applies the requested
  category's mappings, stamps, and mirrors. Replaces the static
  Foundation_-_Normalize_<Category>_V3 task chains and the per-category
  dispatch. Edit the lifecycle schema YAML to change normalization behavior —
  never edit this script for per-field changes. Adding a lifecycle is a new
  schema/list in that lifecycle's pack; this script does not change.
args:
  - name: category
    description: >-
      Product category section to apply within the lifecycle's contract list.
      Empty or unrecognized falls back to the 'generic' section. Case-insensitive.
    required: false
    auto: PREDEFINED
    predefined:
      - endpoint
      - email
      - identity
      - network
      - cloud
      - generic
      - posture_patch
      - posture_vuln
      - posture_exposure
    supportedModules: []
  - name: lifecycle
    description: >-
      Lifecycle token (default nist_ir). Selects which contract list to read by
      naming convention: SOCFrameworkNormalizeMap_<LIFECYCLE.upper()>
      (e.g. nist_ir -> SOCFrameworkNormalizeMap_NIST_IR). A new lifecycle ships
      its own list under that name in its own pack; the engine finds it with no
      change here.
    required: false
    defaultValue: nist_ir
    supportedModules: []
  - name: list_name
    description: >-
      Explicit override of the list name. When omitted it is resolved from the
      lifecycle by the naming convention above.
    supportedModules: []
  - name: normalization_source
    description: |
      Disambiguator for branched stamps. When the schema declares more than
      one stamp value for the same target (e.g. email's normalization_source
      may be 'email' or 'mail_listener' depending on alert source), the
      caller passes the desired branch here.
    supportedModules: []
outputs:
  - contextPath: SOCFramework.NormalizeFromList.category
    description: Category section that was applied.
    type: string
  - contextPath: SOCFramework.NormalizeFromList.list_name
    description: List the contract was loaded from.
    type: string
  - contextPath: SOCFramework.NormalizeFromList.writes_applied
    description: Number of context writes applied (mappings + stamps + mirrors).
    type: number
  - contextPath: SOCFramework.NormalizeFromList.skipped_empty_count
    description: Number of mappings or mirrors skipped due to empty source.
    type: number
  - contextPath: SOCFramework.NormalizeFromList.skipped_filtered_count
    description: Number of branched stamps skipped due to no matching normalization_source.
    type: number
tags:
  - SOC
  - SOC_Framework
  - Foundation
  - Normalize
