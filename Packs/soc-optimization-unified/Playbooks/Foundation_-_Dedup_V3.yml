inputs:
- key: DryRun
  value:
    simple: "true"
  required: false
  description: When true, prints duplicate issues that would be closed without executing
    any close actions. Use for smoke testing after deployment.
  playbookInputQuery: null
- key: DedupWindow
  value:
    complex:
      root: lists
      accessor: SOCOptimizationConfig_V3
      transformers:
      - operator: getField
        args:
          field:
            value:
              simple: Dedup
      - operator: getField
        args:
          field:
            value:
              simple: fields
      - operator: getField
        args:
          field:
            value:
              simple: DedupWindow
  required: false
  description: 'How far back to search for similar alerts. Read from SOCOptimizationConfig_V3.
    Default: 1 days ago.'
  playbookInputQuery: null
- key: DedupScoreThreshold
  value:
    complex:
      root: lists
      accessor: SOCOptimizationConfig_V3
      transformers:
      - operator: getField
        args:
          field:
            value:
              simple: Dedup
      - operator: getField
        args:
          field:
            value:
              simple: fields
      - operator: getField
        args:
          field:
            value:
              simple: DedupScoreThreshold
  required: false
  description: 'If parent incident predicted_score is at or above this value, dedup
    is bypassed. Read from SOCOptimizationConfig_V3. Default: 70.'
  playbookInputQuery: null
- key: SimilarTextField
  value:
    complex:
      root: lists
      accessor: SOCOptimizationConfig_V3
      transformers:
      - operator: getField
        args:
          field:
            value:
              simple: Dedup
      - operator: getField
        args:
          field:
            value:
              simple: fields
      - operator: getField
        args:
          field:
            value:
              simple: SimilarTextField
  required: false
  description: 'Comma-separated alert text fields for DBotFindSimilarAlerts. Resolved
    per (lifecycle, product category) by Foundation - Normalize Artifacts when the
    contract carries dedup-tagged rows; otherwise falls back to
    SOCOptimizationConfig_V3.Dedup.fields.SimilarTextField.'
  playbookInputQuery: null
- key: SimilarJsonField
  value:
    complex:
      root: lists
      accessor: SOCOptimizationConfig_V3
      transformers:
      - operator: getField
        args:
          field:
            value:
              simple: Dedup
      - operator: getField
        args:
          field:
            value:
              simple: fields
      - operator: getField
        args:
          field:
            value:
              simple: SimilarJsonField
  required: false
  description: 'Comma-separated alert JSON fields for DBotFindSimilarAlerts. Resolved
    per (lifecycle, product category) by Foundation - Normalize Artifacts when the
    contract carries dedup-tagged rows; otherwise falls back to
    SOCOptimizationConfig_V3.Dedup.fields.SimilarJsonField.'
  playbookInputQuery: null
outputs: []
