name: Foundation - Dedup_V3
description: |
  Uses alert fingerprinting to detect duplicate alerts within the dedup window.
  Determines the canonical case by selecting the lowest alert ID in the duplicate
  group — deterministic, race-free winner selection. Non-winner instances
  self-close cleanly. The canonical case continues the processing chain.
tags:
- SOC
- SOC_Framework_Unified
