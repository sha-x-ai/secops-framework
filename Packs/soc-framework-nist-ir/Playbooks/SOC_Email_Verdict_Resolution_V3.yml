name: SOC Email Verdict Resolution_V3
description: |-
  Purpose
  Determine the verdict, confidence, and category for an email threat.

  This playbook answers: is this malicious, how confident are we, and what type of threat is it?
  It does NOT answer: who was impacted or what action to take at scale — that is SOC Email Exposure Evaluation_V3.

  Primary signal: Email source ThreatStatus (inputs.ThreatStatus)
    malicious  → verdict=malicious, confidence=high
    suspicious → verdict=malicious, confidence=medium
    default    → verdict=benign,    confidence=low

  Secondary signal: Analysis.Email.source_verdict from DBot (set by Signal Characterization)
    If DBot=malicious AND ThreatStatus returned benign → elevate to suspicious/medium

  Advisory recommendation is set here as a non-executing signal to guide Containment.
  Priority order: escalate_IR > search_and_purge > retract_message > quarantine > no_action
tags:
- SOC
- SOC_Framework_Unified
- Detection & Analysis
- NIST 800-61
- Email
