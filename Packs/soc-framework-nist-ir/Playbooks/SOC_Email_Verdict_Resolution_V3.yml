    type: condition
    task:
      id: a0547d63-5e2a-49b3-9bff-7c1649cef270
      version: -1
      name: Internal Lateral Risk?
      description: |-
        Flags internal lateral spread risk.

        True when ALL of:
          verdict = malicious
          category = phish or malware
          ExposureLevel = clicked
          RecipientScope = multi_user OR tenant_wide

        Two label branches both route to true — OR logic across scope values.
        tenant_wide is the worst case and must not be excluded.
        Matches original SOC_Proofpoint_Analysis task 34 logic.
      type: condition
      iscommand: false
      brand: ""
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
    nexttasks:
      '#default#':
      - "23"
      multi_user:
      - "22"
      tenant_wide:
      - "22"
    separatecontext: false
    conditions:
    - label: multi_user
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: Analysis.Email.verdict
            iscontext: true
          right:
            value:
              simple: malicious
          ignorecase: true
      - - operator: containsGeneral
          left:
            value:
              simple: Analysis.Email.category
            iscontext: true
          right:
            value:
              simple: phish
          ignorecase: true
      - - operator: isEqualString
          left:
            value:
              simple: Analysis.Email.ExposureLevel
            iscontext: true
          right:
            value:
              simple: clicked
          ignorecase: true
      - - operator: isEqualString
          left:
            value:
              simple: Analysis.Email.RecipientScope
            iscontext: true
          right:
            value:
              simple: multi_user
          ignorecase: true
    - label: tenant_wide
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: Analysis.Email.verdict
            iscontext: true
          right:
            value:
              simple: malicious
          ignorecase: true
      - - operator: containsGeneral
          left:
            value:
              simple: Analysis.Email.category
            iscontext: true
          right:
            value:
