  playbookInputQuery: null
- key: ClickCount
  value:
    simple: ${Email.Exposure.click_count}
  required: false
  description: Number of recipients who clicked the threat URL. Set by SOC Email Exposure
    Evaluation_V3.
  playbookInputQuery: null
- key: DeliveredCount
  value:
