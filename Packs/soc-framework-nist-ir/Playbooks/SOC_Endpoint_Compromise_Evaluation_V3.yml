    taskid: 14e2fba4-17d5-4485-ac11-35892f926688
    type: condition
    task:
      id: 14e2fba4-17d5-4485-ac11-35892f926688
      version: -1
      name: Tactic Breadth — Likely Compromised?
      description: Determines likely compromise based on MITRE tactic breadth independent
        of file verdict. C2 (TA0011) + Persistence (TA0003) = confirmed campaign activity.
        Execution (TA0002) + high issue count = high-signal behavioral compromise.
        This prevents unknown-verdict files like NTFVersion.exe from blocking the
        compromise decision when strong tactical evidence exists.
      type: condition
      iscommand: false
      brand: ""
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
    nexttasks:
      '#default#':
      - "76"
      Likely Compromised:
      - "89"
    separatecontext: false
    conditions:
    - label: Likely Compromised
      condition:
      - - operator: containsString
          left:
            value:
              simple: inputs.case_mitre_tactics
            iscontext: true
          right:
            value:
              simple: TA0011
        - operator: containsString
          left:
            value:
              simple: inputs.case_mitre_tactics
            iscontext: true
          right:
            value:
              simple: TA0003
      - - operator: containsString
          left:
            value:
              simple: inputs.case_mitre_tactics
            iscontext: true
          right:
            value:
              simple: TA0002
        - operator: containsString
          left:
            value:
              simple: inputs.case_mitre_tactics
            iscontext: true
          right:
            value:
              simple: TA0008
      - - operator: greaterThanOrEqual
          left:
            value:
              simple: inputs.case_issue_count
            iscontext: true
          right:
            value:
              simple: inputs.high_issue_count
            iscontext: true
        - operator: containsString
          left:
            value:
              simple: inputs.case_mitre_tactics
            iscontext: true
          right:
            value:
              simple: TA0006
