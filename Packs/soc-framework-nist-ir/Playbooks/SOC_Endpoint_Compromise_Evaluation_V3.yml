inputs:
- key: host_likely_compromised
  value:
    simple: "70"
  required: false
  description: Threshold for DBot Predicted Score for Host Likely Compromised
  playbookInputQuery: null
- key: host_suspicious
  value:
    simple: "40"
  required: false
  description: Threshold for DBot Predicted Score for Host Suspicious.  This value
    will be between the host_likely_compromised and this value host_suspicious values.
  playbookInputQuery: null
- key: host_isolated_signal
  value:
    simple: "40"
  required: false
  description: Anything less than this number will be an Isolated Signal for the host.
  playbookInputQuery: null
- key: host_high_issue_count
  value:
    simple: "3"
  required: false
  description: ""
  playbookInputQuery: null
- key: SHA256
  value:
    complex:
      root: SOCFramework.Artifacts.Target.SHA256
      transformers:
      - operator: join
        args:
          separator:
            value:
              simple: ','
  required: false
  description: ""
  playbookInputQuery: null
- key: verdict
  value:
    simple: ${Analysis.Endpoint.verdict}
  required: false
  description: Enriched artifact verdict resolved by SOC_Endpoint_Verdict_Resolution_V3
    after all TI sources and WildFire detonation. Use Analysis.Endpoint.verdict, not
    SOCFramework.Artifacts.Verdict, to ensure compromise evaluation uses the aggregated
    DBot-normalized result rather than the raw source classification.
  playbookInputQuery: null
- key: initiator_sha256
  value:
    simple: ${SOCFramework.Artifacts.Target.SHA256}
  required: false
  description: ""
  playbookInputQuery: null
- key: case_mitre_tactics
  value:
    simple: ${parentIncidentFields.mitre_tactics_ids_and_names}
  required: false
  description: ""
  playbookInputQuery: null
- key: case_mitre_techniques
  value:
    simple: ${parentIncidentFields.mitre_techniques_ids_and_names.[0]}
  required: false
  description: ""
  playbookInputQuery: null
- key: case_issue_count
  value:
    simple: ${parentIncidentFields.alert_count}
  required: false
  description: ""
  playbookInputQuery: null
- key: xdm_sourceprocess_executable_sha256
  value:
    simple: ${SOCFramework.Artifacts.Target.SHA256}
  required: false
  description: ""
  playbookInputQuery: null
- key: cgo_sha256
  value:
    simple: ${SOCFramework.Artifacts.Target.SHA256}
  required: false
  description: ""
  playbookInputQuery: null
- key: tactic_id
