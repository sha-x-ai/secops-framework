  NIST IR phase initializer. Reads SOCFrameworkPhaseContract_V3 and writes
  empty/typed initial values for every key the given phase will produce.
  Inits the phase's top-level orchestrator writes plus the per-category
  writes for the category in SOCFramework.Product.category.

  Never overwrites existing non-empty values — safe to re-run if the
  orchestrator is re-entered.
