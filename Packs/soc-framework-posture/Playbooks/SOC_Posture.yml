name: SOC_Posture
description: |-
  Top-level controller for the Posture lifecycle (NIST SP 800-40 Rev 4).
  Orchestrates the four posture phases in order: Identify, Plan, Execute,
  Verify. Each phase sub-playbook owns its own product-category router and
  dispatches into the per-category Workflow Action playbooks. This controller
  performs phase orchestration only — no category routing, no actions.
