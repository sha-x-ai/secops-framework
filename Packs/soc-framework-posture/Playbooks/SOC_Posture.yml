# SOC_Posture
# Lifecycle controller (phase router) for the Posture lifecycle.
# Mirrors the NIST IR controller (SOC NIST IR (800-61)_V3): a linear chain of
# phase title -> phase sub-playbook, in lifecycle order.
#
# CONTRACT (do not remove):
#   This is the top level of the lifecycle. It orchestrates phases only.
#   It performs NO product-category routing and NO actions — each phase
#   sub-playbook owns the product-category router and the Workflow Actions.

