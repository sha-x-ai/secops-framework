# SOC_Identify
# Identify phase for the Posture lifecycle — PRODUCT-CATEGORY ROUTER.
# Mirrors the NIST IR phase pattern (SOC Analysis_V3):
#   start -> Product Category switch (on SOCFramework.Product.category)
#         -> per-category Execution Branch gate (reads SOCExecutionList_POSTURE)
#         -> per-category Workflow playbook -> Done
# Category identifiers match the contract lists: posture_misconfig /
# posture_compliance / posture_drift.

adopted: true
id: SOC_Identify
version: -1
contentitemexportablefields:
  contentitemfields:
    packID: soc-framework-posture
    packName: SOC Framework Posture Lifecycle
    itemVersion: 1.0.0
    fromServerVersion: 5.0.0
    toServerVersion: ""
    definitionid: ""
    prevname: ""
    isoverridable: false
    supportedModules: []
name: SOC_Identify
description: |-
  Identify phase (NIST SP 800-40 Rev 4). Routes on product category
  (SOCFramework.Product.category) to the per-category Workflow playbook,
  gated by SOCExecutionList_POSTURE execute_branch. Discovery/acknowledge
  phase — no vendor actions (those live in Execute/Verify).
tags:
- SOC
- SOC_Framework_Unified
- Posture
starttaskid: "0"
tasks:
  "0":
    id: "0"
    taskid: soc-identify-start
    type: start
    task:
      id: soc-identify-start
      version: -1
      name: ""
      iscommand: false
      brand: ""
    nexttasks:
      '#none#':
      - "1"
    separatecontext: false
    view: |-
      {"position": {"x": 450, "y": 50}}
  "1":
    id: "1"
    taskid: soc-identify-category
    type: condition
    task:
      id: soc-identify-category
      version: -1
      name: Product Category
      type: condition
      iscommand: false
      brand: ""
    nexttasks:
      '#default#':
      - "8"
      posture_misconfig:
      - "2"
      posture_compliance:
      - "4"
      posture_drift:
      - "6"
    separatecontext: false
    conditions:
    - label: posture_misconfig
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: inputs.ProductCategory
            iscontext: true
          right:
            value:
              simple: posture_misconfig
    - label: posture_compliance
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: inputs.ProductCategory
            iscontext: true
          right:
            value:
              simple: posture_compliance
    - label: posture_drift
      condition:
      - - operator: isEqualString
          left:
            value:
              simple: inputs.ProductCategory
            iscontext: true
          right:
            value:
              simple: posture_drift
    view: |-
      {"position": {"x": 450, "y": 200}}
  "2":
    id: "2"
    taskid: soc-identify-branch-misconfig
    type: condition
    task:
      id: soc-identify-branch-misconfig
      version: -1
      name: Misconfig Execution Branch
      type: condition
      iscommand: false
      brand: ""
    nexttasks:
      '#default#':
      - "8"
      Run:
      - "3"
    separatecontext: false
    conditions:
    - label: Run
      condition:
      - - operator: isEqualString
          left:
            value:
              complex:
                root: inputs.ExecutionBranch
                transformers:
                - operator: getField
                  args:
                    field:
                      value:
                        simple: SOC_Misconfig_Identify
                - operator: getField
                  args:
                    field:
                      value:
                        simple: execute_branch
            iscontext: true
          right:
            value:
              simple: default
    view: |-
      {"position": {"x": 150, "y": 360}}
  "3":
    id: "3"
    taskid: soc-identify-wf-misconfig
    type: playbook
    task:
      id: soc-identify-wf-misconfig
      version: -1
      name: SOC_Misconfig_Identify
