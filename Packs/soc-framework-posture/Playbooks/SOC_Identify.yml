inputs:
- key: ExecutionBranch
  value:
    simple: ${lists.SOCExecutionList_POSTURE}
  required: false
  description: Branch-routing list (execute_branch per Workflow playbook).
  playbookInputQuery: null
- key: ProductCategory
  value:
    simple: ${SOCFramework.Product.category}
  required: false
  description: Routed posture product category.
  playbookInputQuery: null
